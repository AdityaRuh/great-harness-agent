<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Harness — AI Hiring Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafaf9;--bg2:#fff;--bg3:#f5f5f4;--bg4:#e7e5e4;
  --t1:#1c1917;--t2:#57534e;--t3:#a8a29e;--t4:#d6d3d1;
  --border:#e7e5e4;--border2:#d6d3d1;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --a1:#7C6EF0;--a1bg:#EEEDFE;--a1t:#3C3489;--a1s:rgba(108,92,231,.12);--a1b:rgba(108,92,231,.2);
  --a2:#1D9E75;--a2bg:#E1F5EE;--a2t:#085041;--a2s:rgba(29,158,117,.12);--a2b:rgba(29,158,117,.2);
  --a3:#D85A30;--a3bg:#FAECE7;--a3t:#712B13;--a3s:rgba(216,90,48,.12);--a3b:rgba(216,90,48,.25);
  --a4:#378ADD;--a4bg:#E6F1FB;--a4t:#0C447C;--a4s:rgba(55,138,221,.12);--a4b:rgba(55,138,221,.2);
  --ok:#16a34a;--okbg:#f0fdf4;--oks:rgba(22,163,74,.2);
  --warn:#ca8a04;--warnbg:#fefce8;--warns:rgba(202,138,4,.2);
  --err:#dc2626;--errbg:#fef2f2;--errs:rgba(220,38,38,.2);
  --accent:#7C6EF0;--r:12px;--rs:8px
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
input,textarea,select{font-family:var(--font)}

/* Top nav */
.topnav{display:flex;align-items:center;padding:0 24px;height:56px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:20px}
.topnav .logo{display:flex;align-items:center;gap:10px;margin-right:8px}
.topnav .logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7C6EF0,#D4537E);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.topnav .logo span{font-size:15px;font-weight:600;color:var(--t1)}
.topnav .tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--rs);padding:3px;position:absolute;left:50%;transform:translateX(-50%)}
.topnav .tab{padding:6px 16px;font-size:13px;cursor:pointer;color:var(--t3);border-radius:6px;font-weight:400;transition:all .15s;border:1px solid transparent}
.topnav .tab.on{background:var(--bg2);color:var(--t1);font-weight:500;border-color:var(--border);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.topnav .tab:hover:not(.on){color:var(--t2)}
.topnav .right{margin-left:auto;display:flex;align-items:center;gap:12px}

/* Agent avatars in topnav */
.av-row{display:flex}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;margin-right:-6px;border:2px solid var(--bg2);position:relative;cursor:default;transition:transform .15s}
.av:hover{transform:scale(1.12);z-index:10}

/* Buttons */
.btn{padding:7px 16px;font-size:12px;font-weight:500;font-family:var(--font);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .15s;background:var(--bg2);color:var(--t2)}
.btn:hover{background:var(--bg3);color:var(--t1)}.btn:active{transform:scale(.97)}
.btn-p{background:var(--ok);color:#fff;border-color:var(--ok)}.btn-p:hover{background:#15803d}
.btn-ok{background:var(--okbg);color:var(--ok);border-color:var(--oks)}.btn-ok:hover{background:#dcfce7}
.btn-er{background:var(--bg2);color:var(--err);border-color:var(--errs)}.btn-er:hover{background:var(--errbg)}
.btn:disabled{opacity:.3;cursor:default;transform:none}

/* Main content */
.main{flex:1;overflow:auto;padding:0}
.page{max-width:900px;margin:0 auto;padding:24px 32px 60px}
.pipe-header{margin-bottom:24px}
.pipe-header h1{font-size:22px;font-weight:600;letter-spacing:-.5px}
.pipe-header .sub{font-size:13px;color:var(--t3);margin-top:4px}

/* Timeline */
.tl-item{display:flex;gap:16px;margin-bottom:6px}
.tl-left{width:40px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.tl-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;position:relative}
.tl-dot.live::after{content:'';position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--ok);border:2px solid var(--bg)}
.tl-line{width:2px;flex:1;border-radius:1px;min-height:8px}
.tl-card{flex:1;border-radius:var(--r);padding:16px 20px;border:1px solid;transition:all .2s}
.tl-card.active{border-width:2px}
.tl-card.fut{opacity:.35}
.tl-card h4{font-size:14px;font-weight:500;margin-bottom:6px}
.tl-card p{font-size:12px;line-height:1.6;color:var(--t2)}

/* Candidate pills */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pill{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:500;border:1px solid}

/* Candidate row inside card */
.crow{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-radius:var(--rs);margin-bottom:6px}
.crow .cav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.crow .cinfo{flex:1}.crow .cname{font-size:13px;font-weight:500}.crow .cmeta{font-size:11px;color:var(--t3);margin-top:1px}
.crow .cbdg{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}

/* Overview metrics */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.met{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.met .l{font-size:12px;color:var(--t3)}.met .v{font-size:26px;font-weight:600;font-family:var(--mono);margin-top:4px;letter-spacing:-1px}

/* Badges */
.bdg{display:inline-flex;align-items:center;padding:3px 10px;font-size:10px;font-weight:600;border-radius:20px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.3px}
.b-ok{background:var(--okbg);color:var(--ok);border:1px solid var(--oks)}
.b-w{background:var(--warnbg);color:var(--warn);border:1px solid var(--warns)}
.b-e{background:var(--errbg);color:var(--err);border:1px solid var(--errs)}
.b-a1{background:var(--a1bg);color:var(--a1t);border:1px solid var(--a1b)}
.b-a2{background:var(--a2bg);color:var(--a2t);border:1px solid var(--a2b)}
.b-a3{background:var(--a3bg);color:var(--a3t);border:1px solid var(--a3b)}
.b-a4{background:var(--a4bg);color:var(--a4t);border:1px solid var(--a4b)}

/* Checkpoint */
.cp{background:var(--a3bg);border:2px solid var(--a3b);border-radius:var(--r);padding:14px 18px;margin-top:10px;display:flex;flex-wrap:wrap;gap:8px}

/* Forms */
label{display:block;font-size:11px;color:var(--t3);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
input,textarea{width:100%;padding:9px 13px;font-size:13px;background:var(--bg);color:var(--t1);border:1px solid var(--border);border-radius:var(--rs);outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical}

/* Upload zone */
.uz{border:2px dashed var(--border);border-radius:var(--r);padding:40px;text-align:center;cursor:pointer;transition:border-color .2s}.uz:hover{border-color:var(--accent)}

/* Empty */
.empty{text-align:center;padding:60px 20px}.empty .ei{font-size:48px;margin-bottom:16px;opacity:.15}.empty h3{font-size:16px;color:var(--t3);font-weight:500}.empty p{font-size:13px;color:var(--t3);margin-top:6px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border-radius:16px;padding:28px;width:480px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(20px);transition:transform .2s}
.modal-bg.show .modal{transform:translateY(0)}
.modal h3{font-size:18px;font-weight:600;margin-bottom:4px}
.modal .sub{font-size:13px;color:var(--t3);margin-bottom:20px}

/* Candidate review rows */
.cr{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;transition:all .15s}
.cr:hover{border-color:var(--border2)}
.cr .cav2{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.cr .ci{flex:1}.cr .cn{font-size:13px;font-weight:500}.cr .cm{font-size:11px;color:var(--t3);margin-top:2px}
.cr .cs{text-align:right;margin-right:8px}.cr .cs .n{font-size:20px;font-weight:600;font-family:var(--mono);letter-spacing:-1px}.cr .cs .lb{font-size:9px;color:var(--t3);text-transform:uppercase}

.flex{display:flex}.gap{gap:8px}.aic{align-items:center}.jcb{justify-content:space-between}.w100{width:100%}.mt{margin-top:12px}.mb{margin-bottom:12px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .25s ease}
</style>
</head>
<body>

<!-- Top Navigation -->
<div class="topnav" id="topnav">
  <div class="logo"><div class="logo-icon">G</div><span>Great Harness</span></div>
  <div class="tabs" id="mainTabs"></div>
  <div class="right" id="topRight"></div>
</div>

<!-- Modal for New Pipeline -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>New pipeline</h3>
    <p class="sub">Agent 1 will analyze your knowledgebase and generate a JD</p>
    <div class="mb"><label>Role title</label><input id="inp_r" placeholder="e.g. Full Stack Developer"></div>
    <div class="mb"><label>Experience level</label><input id="inp_e" placeholder="e.g. 2 years"></div>
    <div class="mb"><label>Department</label><input id="inp_d" value="Engineering"></div>
    <div class="mb"><label>Candidate type</label><div class="flex gap" id="ctBtns"><button class="btn btn-p" data-v="auto" style="font-size:11px;padding:5px 12px">Auto-detect</button><button class="btn" data-v="fresher" style="font-size:11px;padding:5px 12px">Fresher</button><button class="btn" data-v="experienced" style="font-size:11px;padding:5px 12px">Experienced</button></div></div>
    <div class="flex gap mt"><button class="btn btn-p w100" id="createBtn" onclick="createPipeline()" style="padding:10px">✦ Start Pipeline</button><button class="btn" onclick="closeModal()" style="padding:10px 20px">Cancel</button></div>
    <div id="createRes" class="mt"></div>
  </div>
</div>

<div class="main" id="main"></div>

<script>
var A='/api/v1',V='overview',SP=null,P=[],CT='auto';
function mdToHtml(md){if(!md)return '';return md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/^### (.+)$/gm,'<h4 style="font-size:13px;font-weight:600;color:var(--t1);margin:16px 0 6px">$1</h4>').replace(/^## (.+)$/gm,'<h3 style="font-size:15px;font-weight:600;color:var(--t1);margin:20px 0 8px">$1</h3>').replace(/^# (.+)$/gm,'<h2 style="font-size:17px;font-weight:600;color:var(--t1);margin:24px 0 10px">$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--t1)">$1</strong>').replace(/^- (.+)$/gm,'<div style="display:flex;gap:8px;margin:4px 0;padding-left:4px"><span style="color:var(--a1);flex-shrink:0">•</span><span>$1</span></div>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');}
function tFetch(url){return Promise.race([fetch(url).then(function(r){return r.json()}),new Promise(function(_,rej){setTimeout(function(){rej(new Error('t'))},3000)})]);}
function openModal(){document.getElementById('modalBg').classList.add('show');document.getElementById('inp_r').focus();}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
document.getElementById('ctBtns').onclick=function(e){if(!e.target.dataset.v)return;CT=e.target.dataset.v;document.querySelectorAll('#ctBtns .btn').forEach(function(b){b.className=b.dataset.v===CT?'btn btn-p':'btn';b.style.fontSize='11px';b.style.padding='5px 12px';});};

async function api(p,o){o=o||{};var isPost=o.method&&o.method!=='GET';try{if(isPost){var r=await fetch(A+p,{headers:{'Content-Type':'application/json'},method:o.method,body:o.body});return await r.json();}else{var ctrl=new AbortController();var tm=setTimeout(function(){ctrl.abort()},5000);var r=await fetch(A+p,{headers:{'Content-Type':'application/json'},signal:ctrl.signal});clearTimeout(tm);return await r.json();}}catch(e){return{error:e.message};}}
function go(v,pid){V=v;if(pid!==undefined)SP=pid;if(v==='overview')SP=null;render();}
function sb(s){var m={draft:['Draft','a1'],started:['Started','a1'],analyzing:['Analyzing','a1'],jd_pending_approval:['JD Review','w'],jd_approved:['Approved','ok'],jd_published:['Published','ok'],screening_complete:['Screened','a2'],ranking_complete:['Ranked','a2'],ranking_approved:['Ranking Approved','a2'],ranking_approved:['Ranking Approved','a2'],shortlist_ready:['Shortlist','w'],invites_sent:['Invites Sent','a3'],questions_generated:['Questions Ready','a3'],completed:['Complete','ok']};var x=m[s]||[s||'—','a1'];return '<span class="bdg b-'+x[1]+'">'+x[0]+'</span>';}
async function lp(){P=await api('/pipelines');if(!Array.isArray(P))P=[];}

function renderNav(){
  var tabs='',right='';
  if(SP){
    // Inside a pipeline — show pipeline tabs
    tabs='<div class="tab'+(V==='pipeline'?' on':'')+'" data-t="pipeline">Timeline</div><div class="tab'+(V==='candidates'?' on':'')+'" data-t="candidates">Candidates</div><div class="tab'+(V==='interviews'?' on':'')+'" data-t="interviews">Interviews</div><div class="tab'+(V==='audit'?' on':'')+'" data-t="audit">Audit</div>';
    right='<button class="btn" onclick="go(\'overview\')" style="font-size:12px;margin-right:8px">← Back</button><button class="btn btn-p" onclick="openModal()" style="font-size:12px">+ New pipeline</button>';
  } else {
    // Overview — no tabs, just the button
    tabs='';
    right='<button class="btn btn-p" onclick="openModal()" style="font-size:12px">+ New pipeline</button>';
  }
  document.getElementById('mainTabs').innerHTML=tabs;
  document.getElementById('topRight').innerHTML=right;
  document.getElementById('mainTabs').onclick=function(e){if(!e.target.dataset.t)return;switchTab(e.target.dataset.t);};
}

async function render(){
  renderNav();var m=document.getElementById('main');
  if(V==='overview')await renderOverview(m);
  else if(V==='pipeline'&&SP)await renderPipeline(m);
  else if(V==='candidates'&&SP)await renderCandidatesTab();
  else if(V==='interviews')await renderInterviews();
  else if(V==='audit'&&SP)await renderAudit();
  else await renderOverview(m);
}

async function renderOverview(m){
  await lp();
  if(!P.length){m.innerHTML='<div class="page"><div class="empty"><div class="ei">◈</div><h3>No pipelines yet</h3><p>Create your first AI-powered hiring pipeline</p><button class="btn btn-p mt" style="font-size:14px;padding:10px 24px" onclick="openModal()">+ New pipeline</button></div></div>';return;}
  var h='<div class="page">';
  P.forEach(function(p){
    h+='<div class="card fi" style="cursor:pointer" onclick="go(\'pipeline\',\''+p.id+'\')">';
    h+='<div class="flex jcb aic"><div><div style="font-size:16px;font-weight:600">'+((p.role_title||'')|| (p.config?.role_title||'Untitled'))+'</div>';
    h+='<div style="font-size:12px;color:var(--t3);margin-top:4px">'+(p.id||'').slice(0,16)+'...</div></div>';
    h+='<div class="flex aic gap">'+sb(p.status)+'</div></div></div>';
  });
  h+='</div>';m.innerHTML=h;
}

async function renderPipeline(m){
  var d=await api('/pipelines/'+SP);if(d?.error){m.innerHTML='<div style="color:var(--err);padding:40px">'+d.error+'</div>';return;}
  var hp=!!d.current_checkpoint;var s=d.status||'';
  var a1ok=['jd_pending_approval','jd_approved','ranking_approved','ranking_approved','jd_published','screening_complete','ranking_complete','shortlist_ready','invites_sent','questions_generated','completed'].indexOf(s)>=0;
  var a2ok=['ranking_complete','ranking_approved','shortlist_ready','invites_sent','questions_generated','completed'].indexOf(s)>=0;
  var a3ok=['invites_sent','questions_generated','completed'].indexOf(s)>=0;
  var ivResults=[],schd=[],a4ok=false,pending=[];
  try{var tlAll=await Promise.allSettled([tFetch('/api/v1/interview/results'),tFetch('/api/v1/scheduled-interviews'),tFetch('/api/v1/interview/pending')]);
    if(tlAll[0].status==='fulfilled')ivResults=tlAll[0].value.results||[];
    if(tlAll[1].status==='fulfilled')schd=tlAll[1].value.interviews||[];
    if(tlAll[2].status==='fulfilled')pending=tlAll[2].value.pending||[];
  }catch(e){}
  a4ok=schd.length>0;if(a4ok||ivResults.length)a3ok=true;
  // Check actual interview/scheduling state
  var ivResults=[];try{ivResults=(await(await fetch('/api/v1/interview/results')).json()).results||[];}catch(e){}
  var schd=[];try{schd=(await(await fetch('/api/v1/scheduled-interviews')).json()).interviews||[];}catch(e){}
  var a4ok=schd.length>0;
  if(a4ok)a3ok=true;
  if(ivResults.length>0)a3ok=true;

  // Get candidates for pills
  var cands=[];try{var cr=await api('/pipelines/'+SP+'/candidates');cands=cr?.candidates||[];}catch(e){}

  var h='<div class="page">';
  // Pipeline header with agent avatars
  h+='<div class="pipe-header"><div class="flex jcb aic"><div><h1>'+(d.config?.role_title||'Pipeline')+'</h1>';
  h+='<p class="sub">Created '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+cands.length+' applicants</p></div>';
  h+='<div class="av-row"><div class="av" style="background:var(--a1bg);color:var(--a1t);border-color:var(--bg2)">A1</div><div class="av" style="background:var(--a2bg);color:var(--a2t);border-color:var(--bg2)">A2</div><div class="av" style="background:var(--a3bg);color:var(--a3t);border-color:var(--bg2)">A3</div><div class="av" style="background:var(--a4bg);color:var(--a4t);border-color:var(--bg2)">A4</div></div>';
  h+='</div></div>';

  // Checkpoint alert
  if(hp){h+='<div style="background:var(--warnbg);border:1px solid var(--warns);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px"><div style="width:8px;height:8px;border-radius:50%;background:var(--warn);flex-shrink:0"></div><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--warn)">Checkpoint: '+d.current_checkpoint?.replace(/_/g,' ')+'</div><div style="font-size:11px;color:var(--t3);margin-top:2px">Review and approve to advance</div></div><button class="btn btn-ok" onclick="acp(\'approve\')">✓ Approve</button><button class="btn btn-er" onclick="acp(\'reject\')">✕ Revise</button></div>';}

  // === TIMELINE ===
  // Agent 1 — Purple
  h+='<div class="tl-item fi"><div class="tl-left"><div class="tl-dot" style="background:var(--a1bg);color:var(--a1t)">A1</div><div class="tl-line" style="background:var(--a1)"></div></div>';
  h+='<div class="tl-card" style="background:var(--a1bg);border-color:var(--a1b)"><div class="flex jcb aic"><h4 style="color:var(--a1t)">'+(s==='jd_pending_approval'?'JD generated — awaiting approval':a1ok?'JD generated and approved':'Generating JD...')+'</h4><span class="bdg b-a1">'+(s==='jd_pending_approval'?'Awaiting approval':a1ok?'Completed':'In progress')+'</span></div>';
  if(d.jd_draft)h+='<p style="color:var(--a1t);opacity:.7">Analyzed knowledgebase, mapped '+(d.skills_matrix?.must_have?.length||0)+' must-have skills, drafted JD.</p>';
  if(d.jd_published_url)h+='<p style="margin-top:6px"><a href="'+d.jd_published_url+'" target="_blank" style="color:var(--a1);font-size:12px;font-weight:500">View published JD →</a></p>';
  if(d.jd_draft&&d.current_checkpoint==='jd_approval'){h+='<div style="margin-top:12px;border-top:1px solid var(--a1b);padding-top:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:500;color:var(--a1t)">Generated JD — review before approving</span><button class="btn" onclick="document.getElementById(\'jdPreview\').style.display=document.getElementById(\'jdPreview\').style.display===\'none\'?\'block\':\'none\'" style="font-size:11px;padding:4px 12px">Show/Hide</button></div><div id="jdPreview" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:16px 20px;max-height:500px;overflow:auto;font-size:13px;color:var(--t2);line-height:1.7">'+mdToHtml(d.jd_draft)+'</div></div>';}
  h+='</div></div>';

async function createPipeline(){

function hrd(idx,name,email,dec){
  if(dec==='reject'&&!confirm('Reject '+name+'?'))return;
  fetch(A+'/pipelines/'+SP+'/candidates/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,email:email,decision:dec})}).then(function(r){return r.json()}).then(function(){renderCandidatesTab();});
}

  if(scheduled.length){h+='<div style="font-size:14px;font-weight:500;color:var(--warn);margin:20px 0 12px">Scheduled final interviews</div>';scheduled.forEach(function(s2){
    h+='<div class="card"><div class="flex jcb aic mb"><div><div style="font-size:14px;font-weight:500">'+s2.candidate_name+'</div><div style="font-size:12px;color:var(--t3)">'+s2.date+' at '+s2.time+'</div></div><span class="bdg b-w">'+s2.status+'</span></div><div style="font-size:12px;color:var(--t3);margin-bottom:10px">Meet: <a href="'+(s2.meet_link||'')+'" target="_blank" style="color:var(--a4)">'+(s2.meet_link||'pending')+'</a></div><div class="flex gap"><button class="btn btn-ok" data-n="'+s2.candidate_name+'" data-e="'+(s2.candidate_email||'')+'" onclick="fd(this.dataset.n,this.dataset.e,\'selected\')">✓ Send offer</button><button class="btn btn-er" data-n="'+s2.candidate_name+'" data-e="'+(s2.candidate_email||'')+'" onclick="fd(this.dataset.n,this.dataset.e,\'rejected\')">✕ Not selected</button></div></div>';});}
  if(!results.length&&!scheduled.length&&!pending.length)h+='<div style="text-align:center;padding:80px 20px"><div style="width:80px;height:80px;margin:0 auto 20px;border-radius:20px;background:var(--a3bg);display:flex;align-items:center;justify-content:center"><svg width="36" height="36" fill="none" viewBox="0 0 24 24"><path d="M15 10l-4 4-2-2" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="4" stroke="#D85A30" stroke-width="1.5"/></svg></div><h3 style="font-size:18px;font-weight:600;color:var(--t1);margin-bottom:6px">No interviews yet</h3><p style="font-size:14px;color:var(--t3);max-width:380px;margin:0 auto 20px;line-height:1.6">AI interviews will appear here after candidates complete screening and receive interview invites.</p><button class="btn btn-p" onclick="openModal()">+ Create pipeline</button></div>';
  h+='</div>';m.innerHTML=h;
}
function switchTab(t){V=t;document.querySelectorAll('#mainTabs .tab').forEach(function(tb){tb.classList.toggle('on',tb.dataset.t===t)});var m=document.getElementById('main');m.innerHTML='<div class="page"><div style="text-align:center;padding:40px;color:var(--t3)">Loading...</div></div>';var p;if(t==='pipeline')p=renderPipeline(m);else if(t==='candidates')p=renderCandidatesTab();else if(t==='interviews')p=renderInterviews();else if(t==='audit')p=renderAudit();else if(t==='overview'){SP=null;render();return;}if(p&&p.then)p.then(function(){if(m.innerHTML.indexOf('Loading...')>=0)m.innerHTML='<div class="page"><div style="text-align:center;padding:60px 20px"><p style="font-size:14px;color:var(--t3);margin-bottom:16px">Agent is processing — data will appear shortly</p><button class="btn btn-p" onclick="switchTab(\''+t+'\')">↻ Refresh</button></div></div>';}).catch(function(e){console.error('Tab error:',e);m.innerHTML='<div class="page" style="padding:40px"><h3 style="color:var(--err);margin-bottom:8px">Render error</h3><p style="color:var(--t3);font-size:13px">'+String(e)+'</p><button class="btn btn-p" style="margin-top:12px" onclick="switchTab(\''+t+'\')">↻ Retry</button></div>';})}

function ivd(sid,idx,dec){if(dec==='reject'&&!confirm('Reject? Email will be sent.'))return;fetch('/api/v1/interview/hr-decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,decision:dec})}).then(function(r){return r.json()}).then(function(){renderInterviews();});}
async function renderAudit(){
  var m=document.getElementById('main');
  m.innerHTML='<div class="page"><div style="text-align:center;padding:40px;color:var(--t3)">Loading...</div></div>';
  if(!SP){m.innerHTML='<div class="page"><div class="empty"><div class="ei">☰</div><h3>No pipeline selected</h3></div></div>';return;}
  var d=await api('/pipelines/'+SP);if(!(d.audit_log||[]).length){m.innerHTML='<div class="page"><div class="empty"><div class="ei">☰</div><h3>No audit entries</h3></div></div>';return;}
  var h='<div class="page">';d.audit_log.slice().reverse().forEach(function(e){var ac=e.agent==='agent_1'?'a1':e.agent==='agent_2'?'a2':e.agent==='agent_3'?'a3':'a4';
    h+='<div style="font-size:12px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);display:flex;align-items:center;gap:10px;margin-bottom:6px" class="fi"><span class="bdg b-'+ac+'">'+e.agent+'</span><span style="color:var(--t2)">'+e.action+'</span><span style="margin-left:auto;font-size:10px;color:var(--t3);font-family:var(--mono)">'+(e.explanation||'').slice(0,80)+'</span></div>';});
  h+='</div>';m.innerHTML=h;
}

// Actions
async function acp(dec){var fb='';if(dec==='reject'){fb=prompt('Feedback:');if(!fb)return;}await api('/pipelines/'+SP+'/approve',{method:'POST',body:JSON.stringify({checkpoint:'jd_approval',decision:dec,feedback:dec==='reject'?fb:undefined})});render();}
async function ul(f){if(!f.length)return;var fd2=new FormData();for(var i=0;i<f.length;i++)fd2.append('files',f[i]);await fetch(A+'/pipelines/'+SP+'/upload',{method:'POST',body:fd2});render();}
async function appSL(){await fetch('/api/v1/interview/approve-shortlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pipeline_id:'approved'})});alert('Shortlist approved!');renderInterviews();}
var _ic={};function addIv(sid){_ic[sid]=(_ic[sid]||0)+1;var n=_ic[sid];document.getElementById('interviewers_'+sid).insertAdjacentHTML('beforeend','<div class="flex gap mb"><div style="flex:2"><input id="in_'+sid+'_'+n+'" placeholder="Name"></div><div style="flex:2"><input id="ie_'+sid+'_'+n+'" placeholder="Email"></div><div style="flex:1"><input id="ir_'+sid+'_'+n+'" placeholder="Role"></div></div>');}
async function schIv(sid,name,email){var dt=document.getElementById('dt_'+sid)?.value,tm=document.getElementById('tm_'+sid)?.value,dur=document.getElementById('dur_'+sid)?.value||60;var ivs=[];for(var i=0;i<=(_ic[sid]||0);i++){var n=document.getElementById('in_'+sid+'_'+i)?.value,e=document.getElementById('ie_'+sid+'_'+i)?.value,r=document.getElementById('ir_'+sid+'_'+i)?.value;if(n&&e)ivs.push({name:n,email:e,role:r||''});}if(!ivs.length){alert('Add interviewer');return;}var res=await(await fetch('/api/v1/schedule-interview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,candidate_name:name,candidate_email:email,interview_date:dt,interview_time:tm,duration_minutes:parseInt(dur),interviewers:ivs})})).json();if(res.status==='scheduled'){alert('Scheduled! Meet: '+(res.meet_link||'pending'));renderInterviews();}else alert(JSON.stringify(res));}
async function fd(name,email,dec){if(!confirm(dec==='selected'?'Send OFFER?':'Send REJECTION?'))return;var sal='',st='';if(dec==='selected'){sal=prompt('Salary:','');st=prompt('Start date:','');}await(await fetch('/api/v1/final-decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:name,decision:dec,salary:sal||'',start_date:st||''})})).json();alert(dec==='selected'?'Offer sent!':'Rejection sent.');renderInterviews();}

lp().then(function(){render()});
</script>
