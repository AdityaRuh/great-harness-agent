<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Harness — AI Hiring Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafaf9;--bg2:#fff;--bg3:#f5f5f4;--bg4:#e7e5e4;
  --t1:#1c1917;--t2:#57534e;--t3:#a8a29e;--t4:#d6d3d1;
  --border:#e7e5e4;--border2:#d6d3d1;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --a1:#7C6EF0;--a1bg:#EEEDFE;--a1t:#3C3489;--a1s:rgba(108,92,231,.12);--a1b:rgba(108,92,231,.2);
  --a2:#1D9E75;--a2bg:#E1F5EE;--a2t:#085041;--a2s:rgba(29,158,117,.12);--a2b:rgba(29,158,117,.2);
  --a3:#D85A30;--a3bg:#FAECE7;--a3t:#712B13;--a3s:rgba(216,90,48,.12);--a3b:rgba(216,90,48,.25);
  --a4:#378ADD;--a4bg:#E6F1FB;--a4t:#0C447C;--a4s:rgba(55,138,221,.12);--a4b:rgba(55,138,221,.2);
  --ok:#16a34a;--okbg:#f0fdf4;--oks:rgba(22,163,74,.2);
  --warn:#ca8a04;--warnbg:#fefce8;--warns:rgba(202,138,4,.2);
  --err:#dc2626;--errbg:#fef2f2;--errs:rgba(220,38,38,.2);
  --accent:#7C6EF0;--r:12px;--rs:8px
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
input,textarea,select{font-family:var(--font)}

/* Top nav */
.topnav{display:flex;align-items:center;padding:0 24px;height:56px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:20px}
.topnav .logo{display:flex;align-items:center;gap:10px;margin-right:8px}
.topnav .logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7C6EF0,#D4537E);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.topnav .logo span{font-size:15px;font-weight:600;color:var(--t1)}
.topnav .tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--rs);padding:3px;position:absolute;left:50%;transform:translateX(-50%)}
.topnav .tab{padding:6px 16px;font-size:13px;cursor:pointer;color:var(--t3);border-radius:6px;font-weight:400;transition:all .15s;border:1px solid transparent}
.topnav .tab.on{background:var(--bg2);color:var(--t1);font-weight:500;border-color:var(--border);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.topnav .tab:hover:not(.on){color:var(--t2)}
.topnav .right{margin-left:auto;display:flex;align-items:center;gap:12px}

/* Agent avatars in topnav */
.av-row{display:flex}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;margin-right:-6px;border:2px solid var(--bg2);position:relative;cursor:default;transition:transform .15s}
.av:hover{transform:scale(1.12);z-index:10}

/* Buttons */
.btn{padding:7px 16px;font-size:12px;font-weight:500;font-family:var(--font);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .15s;background:var(--bg2);color:var(--t2)}
.btn:hover{background:var(--bg3);color:var(--t1)}.btn:active{transform:scale(.97)}
.btn-p{background:var(--ok);color:#fff;border-color:var(--ok)}.btn-p:hover{background:#15803d}
.btn-ok{background:var(--okbg);color:var(--ok);border-color:var(--oks);transition:all .2s}.btn-ok:hover{background:#dcfce7;transform:translateY(-1px);box-shadow:0 2px 8px rgba(22,163,74,.15)}
.btn-er{background:var(--bg2);color:var(--err);border-color:var(--errs)}.btn-er:hover{background:var(--errbg)}
.btn:disabled{opacity:.3;cursor:default;transform:none}

/* Main content */
.main{flex:1;overflow:auto;padding:0}
.page{max-width:900px;margin:0 auto;padding:24px 32px 60px}
.pipe-header{margin-bottom:28px}
.pipe-header h1{font-size:24px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,var(--t1) 60%,var(--t2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pipe-header .sub{font-size:13px;color:var(--t3);margin-top:6px;display:flex;align-items:center;gap:8px}

/* Timeline */
.tl-item{display:flex;gap:16px;margin-bottom:6px}
.tl-left{width:40px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.tl-dot{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;position:relative;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tl-dot.live{animation:dotGlow 2s ease infinite}
.tl-dot.live::after{content:'';position:absolute;top:-3px;right:-3px;width:12px;height:12px;border-radius:50%;background:var(--ok);border:2.5px solid var(--bg);box-shadow:0 0 6px rgba(22,163,74,.4)}
@keyframes dotGlow{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.06)}50%{box-shadow:0 2px 16px rgba(0,0,0,.12)}}
.tl-line{width:2.5px;flex:1;border-radius:2px;min-height:12px;transition:background .3s}
.tl-card{flex:1;border-radius:var(--r);padding:16px 20px;border:1px solid;transition:all .2s}
.tl-card.active{border-width:2px}.tl-card.active .shimmer-bar{height:3px;border-radius:2px;margin-top:10px;background:linear-gradient(90deg,transparent 30%,rgba(124,110,240,.15) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 2s ease infinite}
.tl-card.fut{opacity:.35}
.tl-card h4{font-size:14px;font-weight:500;margin-bottom:6px}
.tl-card p{font-size:12px;line-height:1.6;color:var(--t2)}

/* Candidate pills */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pill{font-size:11px;padding:5px 14px;border-radius:20px;font-weight:500;border:1px solid;transition:all .2s;cursor:default}
.pill:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}

/* Candidate row inside card */
.crow{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg3);border-radius:10px;margin-bottom:8px;transition:all .2s;border:1px solid transparent}
.crow:hover{background:var(--bg2);border-color:var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.crow .cav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.crow .cinfo{flex:1}.crow .cname{font-size:13px;font-weight:500}.crow .cmeta{font-size:11px;color:var(--t3);margin-top:1px}
.crow .cbdg{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;transition:all .2s}.card:hover{border-color:var(--border2)}

/* Overview metrics */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.met{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.met .l{font-size:12px;color:var(--t3)}.met .v{font-size:26px;font-weight:600;font-family:var(--mono);margin-top:4px;letter-spacing:-1px}

/* Badges */
.bdg{display:inline-flex;align-items:center;padding:4px 12px;font-size:10px;font-weight:600;border-radius:20px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.4px;backdrop-filter:blur(4px)}
.b-ok{background:var(--okbg);color:var(--ok);border:1px solid var(--oks)}
.b-w{background:var(--warnbg);color:var(--warn);border:1px solid var(--warns)}
.b-e{background:var(--errbg);color:var(--err);border:1px solid var(--errs)}
.b-a1{background:var(--a1bg);color:var(--a1t);border:1px solid var(--a1b)}
.b-a2{background:var(--a2bg);color:var(--a2t);border:1px solid var(--a2b)}
.b-a3{background:var(--a3bg);color:var(--a3t);border:1px solid var(--a3b)}
.b-a4{background:var(--a4bg);color:var(--a4t);border:1px solid var(--a4b)}

/* Checkpoint */
.cp{background:var(--a3bg);border:1.5px solid var(--a3b);border-radius:12px;padding:14px 18px;margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}

/* Forms */
label{display:block;font-size:11px;color:var(--t3);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
input,textarea{width:100%;padding:9px 13px;font-size:13px;background:var(--bg);color:var(--t1);border:1px solid var(--border);border-radius:var(--rs);outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical}

/* Upload zone */
.uz{border:2px dashed var(--border);border-radius:var(--r);padding:40px;text-align:center;cursor:pointer;transition:border-color .2s}.uz:hover{border-color:var(--accent)}

/* Empty */
.empty{text-align:center;padding:60px 20px}.empty .ei{font-size:48px;margin-bottom:16px;opacity:.15}.empty h3{font-size:16px;color:var(--t3);font-weight:500}.empty p{font-size:13px;color:var(--t3);margin-top:6px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border-radius:16px;padding:28px;width:480px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(20px);transition:transform .2s}
.modal-bg.show .modal{transform:translateY(0)}
.modal h3{font-size:18px;font-weight:600;margin-bottom:4px}
.modal .sub{font-size:13px;color:var(--t3);margin-bottom:20px}

/* Candidate review rows */
.cr{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;transition:all .15s}
.cr:hover{border-color:var(--border2)}
.cr .cav2{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.cr .ci{flex:1}.cr .cn{font-size:13px;font-weight:500}.cr .cm{font-size:11px;color:var(--t3);margin-top:2px}
.cr .cs{text-align:right;margin-right:8px}.cr .cs .n{font-size:20px;font-weight:600;font-family:var(--mono);letter-spacing:-1px}.cr .cs .lb{font-size:9px;color:var(--t3);text-transform:uppercase}

.flex{display:flex}.gap{gap:8px}.aic{align-items:center}.jcb{justify-content:space-between}.w100{width:100%}.mt{margin-top:12px}.mb{margin-bottom:12px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .35s ease both}

/* Loading states */
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.btn.loading{pointer-events:none;opacity:.65;position:relative}
.btn.loading::after{content:'';display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-left:6px;vertical-align:middle}
.btn-er.loading::after{border-color:rgba(239,68,68,.3);border-top-color:#ef4444}
.pulse-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;animation:pulse 1s ease infinite;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* === ENHANCED UI === */

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;transition:all .25s;border:none}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.stat-card .stat-row{display:flex;align-items:center;justify-content:space-between}
.stat-card .stat-val{font-size:32px;font-weight:700;font-family:var(--mono);letter-spacing:-2px;line-height:1}
.stat-card .stat-label{font-size:11px;font-weight:500;margin-top:8px;opacity:.7}
.stat-card .stat-ring{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.25);backdrop-filter:blur(4px)}
.stat-card .stat-ring svg{width:18px;height:18px}
.sc-1{background:linear-gradient(135deg,#7C6EF0,#9B8FF7);color:#fff}
.sc-2{background:linear-gradient(135deg,#1D9E75,#3CC49A);color:#fff}
.sc-3{background:linear-gradient(135deg,#D85A30,#F08060);color:#fff}
.sc-4{background:linear-gradient(135deg,#378ADD,#5DA8F0);color:#fff}

/* Pipeline card enhanced */
.pipe-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pipe-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.pipe-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.pipe-card[data-stage="1"]::before{background:var(--a1)}
.pipe-card[data-stage="2"]::before{background:var(--a2)}
.pipe-card[data-stage="3"]::before{background:var(--a3)}
.pipe-card[data-stage="4"]::before{background:var(--a4)}

/* Progress track */
.progress-track{display:flex;align-items:center;gap:0;margin-top:14px}
.progress-step{display:flex;align-items:center}
.progress-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid var(--border);color:var(--t3);background:var(--bg);transition:all .2s}
.progress-dot.done{border-color:var(--ok);background:var(--okbg);color:var(--ok)}
.progress-dot.active{border-color:currentColor;background:currentColor}
.progress-dot.active span{color:#fff}
.progress-dot.a1{color:var(--a1)}.progress-dot.a2{color:var(--a2)}.progress-dot.a3{color:var(--a3)}.progress-dot.a4{color:var(--a4)}
.progress-dot.rd{border-style:dashed}.progress-dot.rd.done{border-style:solid}
.progress-line{width:28px;height:2px;background:var(--border)}
.progress-line.done{background:var(--ok)}

/* Toast notifications */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column-reverse;gap:8px}
.toast{padding:12px 20px;border-radius:var(--r);font-size:13px;font-weight:500;font-family:var(--font);color:#fff;opacity:0;transform:translateX(40px);transition:all .3s ease;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(0)}
.toast.ok{background:#16a34a}.toast.err{background:#dc2626}.toast.warn{background:#ca8a04}.toast.info{background:#378ADD}

/* Shimmer for AI thinking */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer{background:linear-gradient(90deg,transparent 30%,rgba(124,110,240,.08) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 2s ease infinite}

/* Stagger entrance */
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.stagger{opacity:0;animation:slideUp .4s ease forwards}

/* Empty state enhanced */
.empty-hero{text-align:center;padding:60px 20px}
.empty-hero .hero-icon{width:100px;height:100px;margin:0 auto 24px;border-radius:24px;background:linear-gradient(135deg,var(--a1bg),var(--a3bg));display:flex;align-items:center;justify-content:center;position:relative}
.empty-hero .hero-icon::after{content:'';position:absolute;inset:-4px;border-radius:28px;border:2px dashed var(--a1b);animation:spin 20s linear infinite}
.empty-hero h2{font-size:20px;font-weight:600;color:var(--t1);margin-bottom:8px}
.empty-hero p{font-size:14px;color:var(--t3);max-width:400px;margin:0 auto;line-height:1.6}

/* Agent chips for empty state */
.agent-chips{display:flex;justify-content:center;gap:10px;margin:20px 0 28px}
.agent-chip{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid}

</style>
</head>
<body>

<!-- Top Navigation -->
<div class="topnav" id="topnav">
  <div class="logo"><div class="logo-icon">G</div><span>Great Harness</span></div>
  <div class="tabs" id="mainTabs"></div>
  <div class="right" id="topRight"></div>
</div>

<!-- Modal for New Pipeline -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>New pipeline</h3>
    <p class="sub">Agent 1 will analyze your knowledgebase and generate a JD</p>
    <div class="mb"><label>Role title</label><input id="inp_r" placeholder="e.g. Full Stack Developer"></div>
    <div class="mb"><label>Experience level</label><input id="inp_e" placeholder="e.g. 2 years"></div>
    <div class="mb"><label>Department</label><input id="inp_d" value="Engineering"></div>
    <div class="mb"><label>Human interview rounds</label><div class="flex gap" id="roundBtns"><button class="btn btn-p" data-v="1" style="font-size:11px;padding:5px 12px" onclick="setRounds(1,this)">1 Round</button><button class="btn" data-v="2" style="font-size:11px;padding:5px 12px" onclick="setRounds(2,this)">2 Rounds</button><button class="btn" data-v="3" style="font-size:11px;padding:5px 12px" onclick="setRounds(3,this)">3 Rounds</button></div></div>
    <div class="mb"><label>Candidate type</label><div class="flex gap" id="ctBtns"><button class="btn btn-p" data-v="auto" style="font-size:11px;padding:5px 12px">Auto-detect</button><button class="btn" data-v="fresher" style="font-size:11px;padding:5px 12px">Fresher</button><button class="btn" data-v="experienced" style="font-size:11px;padding:5px 12px">Experienced</button></div></div>
    <div class="flex gap mt"><button class="btn btn-p w100" id="createBtn" onclick="createPipeline()" style="padding:10px">✦ Start Pipeline</button><button class="btn" onclick="closeModal()" style="padding:10px 20px">Cancel</button></div>
    <div id="createRes" class="mt"></div>
  </div>
</div>

<div class="main" id="main"></div>

<script>
function toast(msg,type){type=type||'ok';var tc=document.getElementById('toastC');if(!tc){tc=document.createElement('div');tc.id='toastC';tc.className='toast-container';document.body.appendChild(tc);}var t=document.createElement('div');t.className='toast '+type;t.innerHTML=(type==='ok'?'✓ ':type==='err'?'✕ ':type==='warn'?'⚠ ':'ℹ ')+msg;tc.appendChild(t);setTimeout(function(){t.classList.add('show')},10);setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove()},300)},3500);}
function btnLoad(btn,txt){if(!btn||btn.classList.contains('loading'))return;btn._ot=btn.innerHTML;btn.classList.add('loading');btn.disabled=true;if(txt)btn.innerHTML=txt;}
function btnDone(btn){if(!btn)return;btn.classList.remove('loading');btn.disabled=false;if(btn._ot)btn.innerHTML=btn._ot;}

var A='/api/v1',V='overview',SP=null,P=[],CT='auto';var IR=1;
function setRounds(n,btn){IR=n;document.querySelectorAll('#roundBtns .btn').forEach(function(b){b.classList.toggle('btn-p',parseInt(b.dataset.v)===n)});}
function mdToHtml(md){if(!md)return '';return md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/^### (.+)$/gm,'<h4 style="font-size:13px;font-weight:600;color:var(--t1);margin:16px 0 6px">$1</h4>').replace(/^## (.+)$/gm,'<h3 style="font-size:15px;font-weight:600;color:var(--t1);margin:20px 0 8px">$1</h3>').replace(/^# (.+)$/gm,'<h2 style="font-size:17px;font-weight:600;color:var(--t1);margin:24px 0 10px">$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--t1)">$1</strong>').replace(/^- (.+)$/gm,'<div style="display:flex;gap:8px;margin:4px 0;padding-left:4px"><span style="color:var(--a1);flex-shrink:0">•</span><span>$1</span></div>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');}
function tFetch(url){return Promise.race([fetch(url).then(function(r){return r.json()}),new Promise(function(_,rej){setTimeout(function(){rej(new Error('t'))},10000)})]);}
function openModal(){document.getElementById('modalBg').classList.add('show');document.getElementById('inp_r').focus();}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
document.getElementById('ctBtns').onclick=function(e){if(!e.target.dataset.v)return;CT=e.target.dataset.v;document.querySelectorAll('#ctBtns .btn').forEach(function(b){b.className=b.dataset.v===CT?'btn btn-p':'btn';b.style.fontSize='11px';b.style.padding='5px 12px';});};

async function api(p,o){o=o||{};var isPost=o.method&&o.method!=='GET';try{if(isPost){var r=await fetch(A+p,{headers:{'Content-Type':'application/json'},method:o.method,body:o.body});return await r.json();}else{var ctrl=new AbortController();var tm=setTimeout(function(){ctrl.abort()},15000);var r=await fetch(A+p,{headers:{'Content-Type':'application/json'},signal:ctrl.signal});clearTimeout(tm);return await r.json();}}catch(e){return{error:e.message};}}

  var h='<div class="page">';d.audit_log.slice().reverse().forEach(function(e){var ac=e.agent==='agent_1'?'a1':e.agent==='agent_2'?'a2':e.agent==='agent_3'?'a3':'a4';
    h+='<div style="font-size:12px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);display:flex;align-items:center;gap:10px;margin-bottom:6px" class="fi"><span class="bdg b-'+ac+'">'+e.agent+'</span><span style="color:var(--t2)">'+e.action+'</span><span style="margin-left:auto;font-size:10px;color:var(--t3);font-family:var(--mono)">'+(e.explanation||'').slice(0,80)+'</span></div>';});
  h+='</div>';m.innerHTML=h;
}

// Actions
async function acp(dec,btn){var fb='';if(dec==='reject'){fb=prompt('Feedback:');if(!fb)return;}btnLoad(btn,'<span class="pulse-dot"></span>Processing...');try{await api('/pipelines/'+SP+'/approve',{method:'POST',body:JSON.stringify({checkpoint:'jd_approval',decision:dec,feedback:dec==='reject'?fb:undefined})});try{await fetch('/api/v1/interview/approve-shortlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pipeline_id:SP})});}catch(e){}}finally{btnDone(btn);}switchTab('pipeline');}
async function ul(f){if(!f.length)return;var fd2=new FormData();for(var i=0;i<f.length;i++)fd2.append('files',f[i]);await fetch(A+'/pipelines/'+SP+'/upload',{method:'POST',body:fd2});render();}
async function advRound(sid,name){toast(name+' advanced to next round!','ok');renderInterviews();}
async function delPipe(pid){if(!confirm('Delete this pipeline and all its data? This cannot be undone.'))return;try{await fetch('/api/v1/pipelines/'+pid,{method:'DELETE'});if(SP===pid){SP=null;V='overview';}render();}catch(e){toast('Delete failed','err');}}
async function appSL(btn){btnLoad(btn,'<span class="pulse-dot"></span>Approving...');await fetch('/api/v1/interview/approve-shortlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pipeline_id:SP||'all'})});btnDone(btn);toast('Shortlist approved!','ok');renderInterviews();}
var _ic={};function addIv(sid){_ic[sid]=(_ic[sid]||0)+1;var n=_ic[sid];document.getElementById('interviewers_'+sid).insertAdjacentHTML('beforeend','<div class="flex gap mb"><div style="flex:2"><input id="in_'+sid+'_'+n+'" placeholder="Name"></div><div style="flex:2"><input id="ie_'+sid+'_'+n+'" placeholder="Email"></div><div style="flex:1"><input id="ir_'+sid+'_'+n+'" placeholder="Role"></div></div>');}
async function schIv(sid,name,email,btn){btnLoad(btn,'<span class="pulse-dot"></span>Scheduling...');var dt=document.getElementById('dt_'+sid)?.value,tm=document.getElementById('tm_'+sid)?.value,dur=document.getElementById('dur_'+sid)?.value||60;var ivs=[];for(var i=0;i<=(_ic[sid]||0);i++){var n=document.getElementById('in_'+sid+'_'+i)?.value,e=document.getElementById('ie_'+sid+'_'+i)?.value,r=document.getElementById('ir_'+sid+'_'+i)?.value;if(n&&e)ivs.push({name:n,email:e,role:r||''});}if(!ivs.length){toast('Add at least one interviewer','warn');return;}var res=await(await fetch('/api/v1/schedule-interview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,candidate_name:name,candidate_email:email,interview_date:dt,interview_time:tm,duration_minutes:parseInt(dur),interviewers:ivs,round_number:parseInt(btn?.dataset?.round||1),pipeline_id:SP})})).json();if(res.status==='scheduled'){toast('Scheduled! Meet link: '+(res.meet_link||'pending'),'ok');renderInterviews();}else toast('Scheduling failed: '+(res.error||'Unknown error'),'err');}
async function fd(sid,name,email,dec,btn){if(!confirm(dec==='selected'?'Send OFFER?':'Send REJECTION?'))return;btnLoad(btn,dec==='selected'?'<span class="pulse-dot"></span>Sending offer...':'<span class="pulse-dot"></span>Sending...');var sal='',st='';if(dec==='selected'){sal=prompt('Salary:','');st=prompt('Start date:','');}await(await fetch('/api/v1/final-decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid||name,decision:dec,salary:sal||'',start_date:st||''})})).json();btnDone(btn);toast(dec==='selected'?'Offer sent successfully!':'Rejection email sent.','ok');renderInterviews();}

lp().then(function(){render()});
</script>
