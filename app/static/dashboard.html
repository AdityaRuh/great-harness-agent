<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Harness Agent — HR Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0D11;--card:#12151B;--hover:#181C24;--input:#0F1117;--border:#1E2230;--accent:#6C5CE7;--ag:rgba(108,92,231,0.15);--al:#A29BFE;--ok:#00D68F;--okb:rgba(0,214,143,0.08);--warn:#FFB344;--warnb:rgba(255,179,68,0.08);--err:#FF6B6B;--errb:rgba(255,107,107,0.08);--t:#E8ECF4;--tm:#6B7394;--td:#3D4460;--f:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;--r:12px;--rs:8px}
body{font-family:var(--f);background:var(--bg);color:var(--t);height:100vh;display:flex;overflow:hidden}
.sb{width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-i{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--al));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.logo h3{font-size:14px;font-weight:700}.logo small{font-size:10px;color:var(--tm);letter-spacing:.5px;text-transform:uppercase;display:block}
nav{padding:12px 8px;flex:1}.ni{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--rs);cursor:pointer;margin-bottom:2px;color:var(--tm);font-size:13px;transition:all .15s}.ni:hover{background:var(--hover);color:var(--t)}.ni.on{background:var(--ag);color:var(--al);font-weight:600}
.sf{padding:16px 20px;border-top:1px solid var(--border);font-size:10px;color:var(--td)}
main{flex:1;overflow:auto;padding:32px}
h2{font-size:22px;font-weight:700;margin-bottom:8px}.sub{font-size:14px;color:var(--tm);margin-bottom:32px}
.c{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px}.c.glow{box-shadow:0 0 40px var(--ag)}
.g{display:grid;gap:16px}.g4{grid-template-columns:repeat(4,1fr)}.ga{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.b{display:inline-flex;align-items:center;padding:2px 10px;font-size:11px;font-weight:600;border-radius:20px;font-family:var(--fm);text-transform:uppercase}
.b-a{background:var(--ag);color:var(--al);border:1px solid rgba(108,92,231,.3)}.b-ok{background:var(--okb);color:var(--ok);border:1px solid rgba(0,214,143,.3)}.b-w{background:var(--warnb);color:var(--warn);border:1px solid rgba(255,179,68,.3)}.b-e{background:var(--errb);color:var(--err);border:1px solid rgba(255,107,107,.3)}.b-d{background:rgba(59,68,96,.15);color:var(--tm);border:1px solid rgba(59,68,96,.3)}.b-i{background:rgba(78,205,196,.08);color:#4ECDC4;border:1px solid rgba(78,205,196,.3)}
label{display:block;font-size:12px;color:var(--tm);margin-bottom:6px;font-weight:500}
input,textarea{width:100%;padding:10px 14px;font-size:14px;font-family:var(--f);background:var(--input);color:var(--t);border:1px solid var(--border);border-radius:var(--rs);outline:none}input:focus,textarea:focus{border-color:#6C5CE7}textarea{resize:vertical}
.btn{padding:8px 20px;font-size:13px;font-weight:600;font-family:var(--f);border:none;border-radius:var(--rs);cursor:pointer;transition:all .2s}.btn:active{transform:scale(.98)}.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#7D6FF0}.btn-g{background:transparent;color:var(--tm);border:1px solid var(--border)}.btn-g:hover{background:var(--hover)}.btn-ok{background:var(--ok);color:#0B0D11}.btn-e{background:transparent;color:var(--err);border:1px solid rgba(255,107,107,.3)}.btn-lg{padding:12px 28px;font-size:15px}.btn:disabled{opacity:.4;cursor:default}
.sv{font-size:32px;font-weight:700;font-family:var(--fm);text-align:center}.sl{font-size:12px;color:var(--tm);margin-top:4px;text-align:center;text-transform:uppercase}
.empty{text-align:center;padding:60px 20px}.empty b{font-size:48px;display:block;margin-bottom:16px;opacity:.3}.empty h3{font-size:18px;color:var(--tm)}.empty p{font-size:14px;color:var(--td);margin-top:8px}
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border)}.tab{padding:10px 18px;font-size:13px;cursor:pointer;color:var(--tm);border-bottom:2px solid transparent}.tab.on{color:var(--al);font-weight:600;border-bottom-color:var(--accent)}.tab:hover{color:var(--t)}
.uz{border:2px dashed var(--border);border-radius:var(--r);padding:40px;text-align:center;cursor:pointer}.uz:hover{border-color:var(--accent)}
.pulse{width:10px;height:10px;border-radius:50%;background:var(--warn);animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.jd{white-space:pre-wrap;font-size:13px;color:var(--tm);line-height:1.7;max-height:600px;overflow:auto}
.mono{font-family:var(--fm)}.flex{display:flex}.gap{gap:8px}.aic{align-items:center}.jcb{justify-content:space-between}.w{width:100%}.mt{margin-top:16px}.mb{margin-bottom:16px}
</style>
</head>
<body>
<div class="sb"><div class="logo"><div class="logo-i">G</div><div><h3>Great Harness</h3><small>AI Hiring Agent</small></div></div><nav id="nav"></nav><div class="sf">v1.0 · 4 Agents · 14 Sub-agents</div></div>
<main id="main"></main>
<script>
const A='/api/v1';let V='dashboard',SP=null,P=[];
const NAV=[{id:'dashboard',i:'◈',l:'Dashboard'},{id:'new',i:'✦',l:'New Pipeline'},{id:'candidates',i:'◎',l:'Candidates'},{id:'interviews',i:'▶',l:'Interviews'},{id:'audit',i:'☰',l:'Audit Log'}];
async function api(p,o={}){try{const r=await fetch(A+p,{headers:{'Content-Type':'application/json',...(o.headers||{})},...o});return await r.json();}catch(e){return{error:e.message};}}
function go(v,pid){if(v==='pipeline'&&pid){SP=pid;V='pipeline';}else{V=v;SP=null;}rn();rc();}
function sb(s){const m={draft:['Draft','d'],started:['Started','i'],analyzing:['Analyzing','i'],jd_pending_approval:['JD Review','w'],jd_approved:['Approved','ok'],jd_published:['Published','ok'],jd_revision_needed:['Revision','e'],screening_complete:['Screened','i'],ranking_complete:['Ranked','w'],shortlist_ready:['Shortlist','w'],completed:['Complete','ok']};const[l,c]=m[s]||[s||'Unknown','d'];return`<span class="b b-${c}">${l}</span>`;}
function rn(){document.getElementById('nav').innerHTML=NAV.map(n=>`<div class="ni ${V===n.id?'on':''}" onclick="go('${n.id}')"><span style="font-size:16px;width:20px;text-align:center">${n.i}</span>${n.l}</div>`).join('');}
async function lp(){P=await api('/pipelines');if(!Array.isArray(P))P=[];rn();}
async function rc(){const m=document.getElementById('main');if(V==='dashboard')await rd(m);else if(V==='new')rnp(m);else if(V==='pipeline'&&SP)await rpd(m);else if(V==='candidates')await rca(m);else if(V==='interviews')await rint(m);else m.innerHTML=`<div class="empty"><b>☰</b><h3>Audit Log</h3><p>Select a pipeline from dashboard</p></div>`;}
async function rd(m){await lp();if(!P.length){m.innerHTML=`<div class="empty"><b>◈</b><h3>No pipelines yet</h3><p>Create your first hiring pipeline</p><button class="btn btn-p btn-lg mt" onclick="go('new')">✦ Create Pipeline</button></div>`;return;}
m.innerHTML=`<div class="flex jcb aic mb"><h2>Active Pipelines</h2><button class="btn btn-g" onclick="rc()">↻ Refresh</button></div><div class="g ga">${P.map(p=>`<div class="c" style="cursor:pointer" onclick="go('pipeline','${p.id}')"><div class="flex jcb aic mb"><div style="font-size:16px;font-weight:600">${p.role_title||'Untitled'}</div>${sb(p.status)}</div><div style="font-size:12px;color:var(--tm)" class="mono">${(p.id||'').slice(0,12)}...</div></div>`).join('')}</div>`;}
function rnp(m){m.innerHTML=`<h2>Start New Pipeline</h2><p class="sub">Agent 1 will analyze your knowledgebase, map skills, and generate a JD.</p><div class="c glow" style="max-width:560px"><div class="mb"><label>Role Title</label><input id="r" placeholder="e.g. Frontend Developer"></div><div class="mb"><label>Experience Level</label><input id="e" placeholder="e.g. 2 years"></div><div class="mb"><label>Department</label><input id="d" value="Engineering"></div><div class="mb"><label>Candidate Type</label><div class="flex gap" id="ct"><button class="btn btn-p" data-v="auto">Auto-detect</button><button class="btn btn-g" data-v="fresher">Fresher</button><button class="btn btn-g" data-v="experienced">Experienced</button></div></div><button class="btn btn-p btn-lg w" id="go" onclick="cp()">✦ Start Pipeline</button><div id="res" class="mt"></div></div>`;let t='auto';document.getElementById('ct').onclick=e=>{if(!e.target.dataset.v)return;t=e.target.dataset.v;document.querySelectorAll('#ct .btn').forEach(b=>b.className=b.dataset.v===t?'btn btn-p':'btn btn-g');};window._t=()=>t;}
async function cp(){const r=document.getElementById('r').value,e=document.getElementById('e').value,d=document.getElementById('d').value,t=window._t();if(!r||!e)return;const b=document.getElementById('go');b.disabled=true;b.textContent='Agent 1 analyzing...';const res=await api('/pipelines',{method:'POST',body:JSON.stringify({role_title:r,experience_level:e,department:d,candidate_type:t})});b.disabled=false;b.textContent='✦ Start Pipeline';const o=document.getElementById('res');if(res?.error)o.innerHTML=`<div class="c" style="border-color:rgba(255,107,107,.3)"><div style="color:var(--err);font-size:13px">${JSON.stringify(res.error)}</div></div>`;else if(res?.id){await lp();o.innerHTML=`<div class="c" style="border-color:rgba(0,214,143,.3)"><div style="font-size:14px;font-weight:600;color:var(--ok);margin-bottom:8px">Pipeline Created!</div><div style="font-size:12px;color:var(--tm)" class="mono mb">ID: ${res.id}</div>${sb(res.status)}${res.jd_draft?`<details class="mt"><summary style="font-size:13px;color:var(--al);cursor:pointer">View Generated JD</summary><div class="jd mt">${res.jd_draft}</div></details>`:''}<button class="btn btn-p mt" onclick="go('pipeline','${res.id}')">View Pipeline →</button></div>`;}}
async function rpd(m){const d=await api(`/pipelines/${SP}`);if(d?.error){m.innerHTML=`<div style="color:var(--err);padding:40px">${d.error}</div>`;return;}const hp=!!d.current_checkpoint;let tab='overview';m.innerHTML=`<div class="flex jcb aic mb"><div><h2>${d.config?.role_title||'Pipeline'}</h2><div style="font-size:12px;color:var(--tm)" class="mono mt">${SP.slice(0,20)}...</div></div><div class="flex gap aic">${sb(d.status)}<button class="btn btn-g" onclick="rc()">↻</button></div></div><div class="tabs" id="tabs"><div class="tab on" data-t="overview">Overview</div><div class="tab" data-t="jd">JD</div><div class="tab" data-t="candidates">Candidates</div><div class="tab" data-t="audit">Audit</div></div><div id="tc"></div>`;document.getElementById('tabs').onclick=e=>{if(!e.target.dataset.t)return;tab=e.target.dataset.t;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.t===tab));rt();};function rt(){const tc=document.getElementById('tc');if(tab==='overview'){tc.innerHTML=`<div class="g g4 mb"><div class="c"><div class="sv" style="color:var(--al)">${(d.status||'').split('_').pop()}</div><div class="sl">Status</div></div><div class="c"><div class="sv" style="color:${hp?'var(--warn)':'var(--td)'}">${hp?'Active':'None'}</div><div class="sl">Checkpoint</div></div><div class="c"><div class="sv">${d.skills_matrix?.must_have?.length||0}</div><div class="sl">Must-have</div></div><div class="c"><div class="sv">${d.audit_log?.length||0}</div><div class="sl">Audit</div></div></div>${hp?`<div class="c glow" style="border-color:rgba(255,179,68,.3)"><div class="flex aic gap mb"><div class="pulse"></div><div style="font-size:15px;font-weight:600;color:var(--warn)">Checkpoint: ${d.current_checkpoint?.replace(/_/g,' ')}</div></div><div class="flex gap mb"><button class="btn btn-ok" onclick="acp('approve')">✓ Approve</button><button class="btn btn-e" onclick="acp('reject')">✕ Request Changes</button></div><label>Feedback (for rejection)</label><textarea id="fb" rows="3" placeholder="What changes?"></textarea></div>`:''}${d.jd_published_url?`<div class="c"><span style="font-size:13px;color:var(--tm)">Published: </span><a href="${d.jd_published_url}" target="_blank" style="color:var(--al)">${d.jd_published_url}</a></div>`:''}<div class="c"><div style="font-size:15px;font-weight:600;margin-bottom:12px">Upload Resumes</div><div class="uz" onclick="document.getElementById('fu').click()"><div style="font-size:32px;margin-bottom:8px;opacity:.3">📄</div><div style="font-size:14px;color:var(--tm)">Drop PDF/DOCX here or click to upload</div></div><input type="file" id="fu" multiple accept=".pdf,.docx" style="display:none" onchange="ul(this.files)"></div>`;}else if(tab==='jd'){tc.innerHTML=d.jd_draft?`<div class="c"><div style="font-size:15px;font-weight:600;margin-bottom:16px">Generated Job Description</div><div class="jd">${d.jd_draft}</div></div>`:`<div class="empty"><b>📝</b><h3>JD not yet generated</h3></div>`;}else if(tab==='candidates'){rcl(tc);}else if(tab==='audit'){tc.innerHTML=(d.audit_log||[]).length?d.audit_log.slice().reverse().map(e=>`<div class="c" style="padding:16px"><div class="flex jcb aic mb"><span class="b ${e.agent==='agent_1'?'b-a':e.agent==='agent_2'?'b-i':'b-d'}">${e.agent}</span><span style="font-size:11px;color:var(--td)" class="mono">${e.action}</span></div><div style="font-size:13px;color:var(--tm);line-height:1.5">${(e.explanation||'').slice(0,300)}</div></div>`).join(''):`<div class="empty"><b>☰</b><h3>No audit entries</h3></div>`;}}rt();}
async function acp(dec){const fb=document.getElementById('fb')?.value;if(dec==='reject'&&!fb){alert('Provide feedback');return;}await api(`/pipelines/${SP}/approve`,{method:'POST',body:JSON.stringify({checkpoint:'jd_approval',decision:dec,feedback:dec==='reject'?fb:undefined})});rc();}
async function ul(f){if(!f.length)return;const fd=new FormData();for(const x of f)fd.append('files',x);await fetch(`${A}/pipelines/${SP}/upload`,{method:'POST',body:fd});rc();}
async function rcl(tc){const r=await api(`/pipelines/${SP}/candidates`);if(!r?.candidates?.length){tc.innerHTML=`<div class="empty"><b>◎</b><h3>No candidates</h3><p>Upload resumes or candidates apply via careers page</p></div>`;return;}tc.innerHTML=r.candidates.map((c,idx)=>{const col=c.screening_verdict?.includes('Shortlisted')?'ok':c.screening_verdict?.includes('Flagged')?'w':'e';const esc=c.escalated?'<span style="font-size:10px;color:var(--warn);margin-left:4px">⚠ ESCALATED</span>':'';return`<div class="c" style="padding:16px" id="cand_${idx}"><div class="flex jcb aic"><div><div style="font-size:14px;font-weight:600">${c.name}${esc}</div><div style="font-size:11px;color:var(--td)">${c.candidate_type||''} · ${c.email||''}</div></div><div class="flex aic gap">${c.screening_score!=null?`<div style="font-size:20px;font-weight:700;font-family:var(--fm);color:${c.screening_score>=60?'var(--ok)':c.screening_score>=45?'var(--warn)':'var(--err)'}">${c.screening_score}</div>`:''}\${c.screening_verdict?`<span class="b b-${col}">${c.screening_verdict}</span>`:''}</div></div>${c.decision_note?`<div style="font-size:12px;color:var(--tm);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5">${c.decision_note}</div>`:''}${c.red_flags?.length?`<div style="font-size:11px;color:var(--err);margin-top:8px">Red flags: ${c.red_flags.join(', ')}</div>`:''}${(c.screening_verdict?.includes('Flagged')||c.escalated)?`<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px"><div style="font-size:12px;font-weight:600;color:var(--warn);margin-bottom:8px">⚠ Needs HR Review</div><textarea id="hr_note_${idx}" rows="2" placeholder="Your notes on this candidate..." style="margin-bottom:8px"></textarea><div class="flex gap"><button class="btn btn-ok" onclick="hrDecision(${idx},'${c.name}','${c.email||''}','approve')">✓ Approve for Interview</button><button class="btn btn-e" onclick="hrDecision(${idx},'${c.name}','${c.email||''}','reject')">✕ Reject</button></div></div>`:c.screening_verdict?.includes('Shortlisted')?`<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px"><div class="flex gap"><button class="btn btn-ok" onclick="hrDecision(${idx},'${c.name}','${c.email||''}','approve')">✓ Move to Interview</button><button class="btn btn-e" onclick="hrDecision(${idx},'${c.name}','${c.email||''}','reject')">✕ Reject</button><button class="btn btn-g" onclick="hrDecision(${idx},'${c.name}','${c.email||''}','hold')">⏸ Hold</button></div></div>`:''}</div>`;}).join('');}
async function rca(m){await lp();if(!P.length){m.innerHTML=`<div class="empty"><b>◎</b><h3>No pipelines</h3></div>`;return;}m.innerHTML=`<h2 class="mb">All Candidates</h2>`;for(const p of P){const r=await api(`/pipelines/${p.id}/candidates`);if(r?.candidates?.length){m.innerHTML+=`<div style="font-size:15px;font-weight:600;color:var(--al);margin:16px 0 8px;cursor:pointer" onclick="go('pipeline','${p.id}')">${p.role_title} →</div>`;m.innerHTML+=r.candidates.map(c=>`<div class="c" style="padding:12px"><div class="flex jcb aic"><span>${c.name}</span><span class="b b-${c.screening_verdict?.includes('Shortlisted')?'ok':'d'}">${c.screening_verdict||'pending'}</span></div></div>`).join('');}}}

async function rint(m){
  // Fetch interview results and scheduled interviews
  let results=[],scheduled=[];
  try{results=(await(await fetch('/api/v1/interview/results')).json()).results||[];}catch(e){}
  try{scheduled=(await(await fetch('/api/v1/scheduled-interviews')).json()).interviews||[];}catch(e){}

  let html='<h2 class="mb">Interviews & Scheduling</h2>';

  // Shortlisted from AI interview — ready to schedule
  if(results.length){
    html+='<div style="font-size:15px;font-weight:600;color:var(--al);margin-bottom:12px">AI Interview Results</div>';
    results.forEach(function(r){
      const col=r.interview_score>=70?'ok':r.interview_score>=55?'w':'e';
      const isScheduled=scheduled.some(function(s){return s.candidate_name===r.candidate_name});
      html+=`<div class="c" style="padding:16px"><div class="flex jcb aic mb"><div><div style="font-size:14px;font-weight:600">${r.candidate_name}</div><div style="font-size:11px;color:var(--td)">Session: ${(r.session_id||'').slice(0,12)}...</div></div><div class="flex aic gap"><span style="font-size:20px;font-weight:700;font-family:var(--fm);color:var(--${col})">${r.interview_score}</span><span class="b b-${col}">${r.verdict}</span></div></div>${isScheduled?'<div style="font-size:12px;color:var(--ok);margin-bottom:8px">✓ Final interview scheduled</div>':''}${r.interview_score>=50&&!isScheduled?`<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:8px"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Schedule Final Interview</div><div class="flex gap mb"><div style="flex:1"><label>Date</label><input type="date" id="dt_${r.session_id}" value="2026-04-20"></div><div style="flex:1"><label>Time</label><input type="time" id="tm_${r.session_id}" value="15:00"></div><div style="flex:1"><label>Duration (min)</label><input type="number" id="dur_${r.session_id}" value="60"></div></div><div id="interviewers_${r.session_id}"><div class="flex gap mb"><div style="flex:2"><label>Interviewer Name</label><input id="in_${r.session_id}_0" placeholder="e.g. Vaibhav"></div><div style="flex:2"><label>Email</label><input id="ie_${r.session_id}_0" placeholder="e.g. vaibhav@ruh.ai"></div><div style="flex:1"><label>Role</label><input id="ir_${r.session_id}_0" placeholder="CTO"></div></div></div><div class="flex gap"><button class="btn btn-g" onclick="addInterviewer('${r.session_id}')">+ Add Interviewer</button><button class="btn btn-p" onclick="scheduleInterview('${r.session_id}','${r.candidate_name}','')">Schedule & Send Invites</button></div></div>`:''}</div>`;
    });
  }

  // Scheduled interviews — pending final decision
  if(scheduled.length){
    html+='<div style="font-size:15px;font-weight:600;color:var(--warn);margin:24px 0 12px">Scheduled Final Interviews</div>';
    scheduled.forEach(function(s){
      html+=`<div class="c" style="padding:16px"><div class="flex jcb aic mb"><div><div style="font-size:14px;font-weight:600">${s.candidate_name}</div><div style="font-size:12px;color:var(--tm)">${s.date} at ${s.time} · ${s.interviewers?.map(function(i){return i.name}).join(', ')}</div></div><span class="b b-w">${s.status}</span></div><div style="font-size:12px;color:var(--tm);margin-bottom:8px">Meet: <a href="${s.meet_link}" target="_blank" style="color:var(--al)">${s.meet_link||'Link pending'}</a></div><div class="flex gap"><button class="btn btn-ok" onclick="finalDecision('${s.candidate_name}','${s.candidate_email}','selected')">✓ Selected — Send Offer</button><button class="btn btn-e" onclick="finalDecision('${s.candidate_name}','${s.candidate_email}','rejected')">✕ Not Selected</button></div></div>`;
    });
  }

  if(!results.length&&!scheduled.length){
    html+='<div class="empty"><b>▶</b><h3>No interviews yet</h3><p>Complete the AI screening round first</p></div>';
  }
  m.innerHTML=html;
}

var _ic={};
function addInterviewer(sid){
  _ic[sid]=(_ic[sid]||0)+1;var n=_ic[sid];
  var div=document.getElementById('interviewers_'+sid);
  div.insertAdjacentHTML('beforeend','<div class="flex gap mb"><div style="flex:2"><input id="in_'+sid+'_'+n+'" placeholder="Name"></div><div style="flex:2"><input id="ie_'+sid+'_'+n+'" placeholder="Email"></div><div style="flex:1"><input id="ir_'+sid+'_'+n+'" placeholder="Role"></div></div>');
}

async function scheduleInterview(sid,name,email){
  var dt=document.getElementById('dt_'+sid)?.value;
  var tm=document.getElementById('tm_'+sid)?.value;
  var dur=document.getElementById('dur_'+sid)?.value||60;
  var interviewers=[];
  for(var i=0;i<=(_ic[sid]||0);i++){
    var n=document.getElementById('in_'+sid+'_'+i)?.value;
    var e=document.getElementById('ie_'+sid+'_'+i)?.value;
    var r=document.getElementById('ir_'+sid+'_'+i)?.value;
    if(n&&e)interviewers.push({name:n,email:e,role:r||''});
  }
  if(!interviewers.length){alert('Add at least one interviewer');return;}
  var body={session_id:sid,candidate_name:name,candidate_email:email,interview_date:dt,interview_time:tm,duration_minutes:parseInt(dur),interviewers:interviewers};
  var res=await(await fetch('/api/v1/schedule-interview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
  if(res.status==='scheduled'){alert('Interview scheduled! Invites sent to '+res.invites_sent+' people.\nMeet link: '+(res.meet_link||'pending'));rint(document.getElementById('main'));}
  else alert('Error: '+JSON.stringify(res));
}

async function finalDecision(name,email,decision){
  var msg=decision==='selected'?'Send OFFER to '+name+'?':'Send REJECTION to '+name+'?';
  if(!confirm(msg))return;
  var salary='',start='';
  if(decision==='selected'){salary=prompt('Salary offer (e.g. 15 LPA):','');start=prompt('Start date (e.g. May 1, 2026):','');}
  var res=await(await fetch('/api/v1/final-decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:name,decision:decision,salary:salary||'',start_date:start||''})})).json();
  alert(decision==='selected'?'Offer sent!':'Rejection sent.');
  rint(document.getElementById('main'));
}

function hrDecision(idx,name,email,decision){
  var note=document.getElementById('hr_note_'+idx)?.value||'';
  var card=document.getElementById('cand_'+idx);
  if(decision==='approve'){
    card.style.borderColor='rgba(0,214,143,.5)';
    card.insertAdjacentHTML('beforeend','<div style="color:var(--ok);font-size:12px;font-weight:600;margin-top:8px">✓ Approved for interview by HR'+(note?' — '+note:'')+'</div>');
    // Could also trigger email to candidate here
  }else if(decision==='reject'){
    if(!confirm('Reject '+name+'?'))return;
    card.style.borderColor='rgba(255,107,107,.3)';card.style.opacity='.5';
    card.insertAdjacentHTML('beforeend','<div style="color:var(--err);font-size:12px;font-weight:600;margin-top:8px">✕ Rejected by HR'+(note?' — '+note:'')+'</div>');
  }else{
    card.style.borderColor='rgba(255,179,68,.3)';
    card.insertAdjacentHTML('beforeend','<div style="color:var(--warn);font-size:12px;font-weight:600;margin-top:8px">⏸ On hold'+(note?' — '+note:'')+'</div>');
  }
  // Remove action buttons
  var btns=card.querySelectorAll('.btn-ok,.btn-e,.btn-g');btns.forEach(function(b){b.disabled=true;b.style.opacity='.3'});
}

lp().then(()=>rc());
</script>
