<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview — Ruh AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#0a0a1a;color:#e0e0e0;height:100vh;overflow:hidden}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(10,10,26,0.95);border-bottom:1px solid rgba(124,110,240,0.15)}
.topbar .logo{font-weight:700;font-size:18px;color:#7c6ef0}
.topbar .logo span{color:#4ade80}
.topbar .timer{background:rgba(124,110,240,0.1);border:1px solid rgba(124,110,240,0.3);border-radius:20px;padding:6px 16px;font-size:14px;display:flex;align-items:center;gap:6px}
.topbar .timer .dot{width:8px;height:8px;border-radius:50%;background:#f87171;animation:blink 1s infinite}
.topics{display:flex;gap:8px;padding:8px 24px;background:rgba(10,10,26,0.9);border-bottom:1px solid rgba(255,255,255,0.05)}
.topic{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;background:rgba(255,255,255,0.05);color:#888}
.topic.active{background:rgba(124,110,240,0.15);color:#7c6ef0}
.topic.done{background:rgba(74,222,128,0.1);color:#4ade80}
.main{display:flex;height:calc(100vh - 90px)}
.avatar-side{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;background:linear-gradient(135deg,#0d0d24,#1a1a3e)}
.avatar-glow{position:absolute;width:440px;height:440px;border-radius:50%;background:radial-gradient(circle,rgba(124,110,240,0.12),transparent 70%);pointer-events:none;animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.avatar-circle{width:160px;height:160px;border-radius:50%;background:linear-gradient(135deg,#7c6ef0,#4ade80);display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:700;color:#fff;box-shadow:0 0 60px rgba(124,110,240,.3);position:relative;z-index:1;transition:.3s}
.avatar-circle.speaking{animation:speak .5s ease-in-out infinite alternate}
@keyframes speak{0%{transform:scale(1);box-shadow:0 0 60px rgba(124,110,240,.3)}100%{transform:scale(1.06);box-shadow:0 0 80px rgba(124,110,240,.5)}}
.avatar-name{margin-top:20px;font-size:14px;color:#888;z-index:1}
.avatar-name .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;background:#4ade80}
.speech-bubble{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);max-width:500px;background:rgba(20,20,50,.9);backdrop-filter:blur(12px);border:1px solid rgba(124,110,240,.2);border-radius:16px;padding:16px 20px;font-size:15px;line-height:1.6;color:#ccc;text-align:center;display:none;z-index:2}
.candidate-side{width:360px;display:flex;flex-direction:column;background:#0d0d1e;border-left:1px solid rgba(255,255,255,.05)}
.webcam-wrapper{position:relative;width:100%;aspect-ratio:4/3;background:#111;overflow:hidden}
.webcam-wrapper video{width:100%;height:100%;object-fit:cover;display:none}
.webcam-off{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#555;font-size:13px}
.webcam-label{position:absolute;bottom:8px;left:8px;font-size:11px;color:#fff;background:rgba(0,0,0,.6);padding:2px 8px;border-radius:4px}
.mic-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(124,110,240,.05);border-bottom:1px solid rgba(255,255,255,.05)}
.mic-name{font-size:12px;color:#888;flex:1}
.levels{display:flex;gap:2px;align-items:center;height:16px}
.levels .bar{width:3px;background:#4ade80;border-radius:2px;min-height:3px}
.transcript{flex:1;overflow-y:auto;padding:16px}
.transcript h3{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.msg{margin-bottom:12px;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.msg.ai{background:rgba(124,110,240,.08);border-left:3px solid #7c6ef0}
.msg.user{background:rgba(74,222,128,.05);border-left:3px solid #4ade80}
.msg .speaker{font-size:10px;font-weight:600;text-transform:uppercase;margin-bottom:4px;color:#666}
.controls{padding:12px 16px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:8px}
.btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-start{background:#7c6ef0;color:#fff}
.btn-start:hover{background:#6b5ce0}
.btn-end{background:rgba(220,38,38,.2);color:#f87171;border:1px solid rgba(220,38,38,.3)}
.btn-end:hover{background:#dc2626;color:#fff}
.btn:disabled{opacity:.3;cursor:not-allowed}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="topbar"><div class="logo">Ruh<span>AI</span> Interview</div><div class="timer"><div class="dot"></div><span id="timer">30:00</span></div></div>
<div class="topics" id="topics"></div>
<div class="main">
<div class="avatar-side"><div class="avatar-glow"></div><div class="avatar-circle" id="avatarCircle">Z</div><div class="avatar-name"><span class="dot"></span>Zara — AI Interviewer</div><div class="speech-bubble" id="speechBubble"></div></div>
<div class="candidate-side"><div class="webcam-wrapper"><video id="webcam" autoplay muted playsinline></video><div class="webcam-off" id="webcamOff">Camera loading...</div><div class="webcam-label">You</div></div><div class="mic-bar"><span style="color:#4ade80">&#x1f3a4;</span><span class="mic-name" id="micName">Connecting...</span><div class="levels" id="levels"></div></div><div class="transcript" id="transcript"><h3>Conversation</h3></div><div class="controls"><button class="btn btn-start" id="startBtn">Start Interview</button><button class="btn btn-end" id="endBtn" disabled>End Interview</button></div></div>
</div>
<script>
(function(){
function setupMedia(){navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(function(s){var v=document.getElementById("webcam");v.srcObject=s;v.style.display="block";document.getElementById("webcamOff").style.display="none";document.getElementById("micName").textContent="Mic active";var ctx=new AudioContext(),src=ctx.createMediaStreamSource(s),a=ctx.createAnalyser();a.fftSize=64;src.connect(a);var fd=new Uint8Array(a.frequencyBinCount),lv=document.getElementById("levels");for(var i=0;i<8;i++){var b=document.createElement("div");b.className="bar";b.style.height="3px";lv.appendChild(b)}var bars=lv.querySelectorAll(".bar");(function t(){a.getByteFrequencyData(fd);for(var i=0;i<bars.length;i++)bars[i].style.height=Math.max(3,fd[i*2]/8)+"px";requestAnimationFrame(t)})()}).catch(function(){document.getElementById("micName").textContent="Allow camera/mic";document.getElementById("webcamOff").textContent="Click allow on permission popup"})}
var timeLeft=1800,ti=null;function startTimer(){ti=setInterval(function(){timeLeft--;var m=Math.floor(timeLeft/60),s=timeLeft%60;document.getElementById("timer").textContent=m+":"+(s<10?"0":"")+s;if(timeLeft<=0)clearInterval(ti)},1000)}
function addMsg(who,txt){var d=document.createElement("div");d.className="msg "+(who==="AI"?"ai":"user");d.innerHTML='<div class="speaker">'+who+"</div>"+txt;document.getElementById("transcript").appendChild(d);d.scrollIntoView({behavior:"smooth"});if(who==="AI"){var b=document.getElementById("speechBubble");b.textContent=txt;b.style.display="block";document.getElementById("avatarCircle").classList.add("speaking");setTimeout(function(){b.style.display="none";document.getElementById("avatarCircle").classList.remove("speaking")},10000)}}
var topics=["Technical","Architecture","Problem Solving","Culture Fit","Q&A"],te=document.getElementById("topics");topics.forEach(function(t,i){var d=document.createElement("div");d.className="topic"+(i===0?" active":"");d.textContent=t;d.id="topic-"+i;te.appendChild(d)});
var qi=0,active=false,qs=["Can you walk me through your most recent project and your specific role in it?","What technologies did you use and why?","Tell me about a technical challenge you faced and how you solved it.","How do you debug production issues under pressure?","Describe your experience with React and Next.js in production.","How do you manage state in large React applications?","What is your backend experience with Python, FastAPI, databases?","How do you approach API design and documentation?","Tell me about a system you architected from scratch.","How do you ensure code quality in your team?","What is your testing approach — unit, integration, e2e?","How do you prioritize when multiple things are urgent?","What excites you about this role at Ruh AI?","Any questions for us about the role or team?"];
function askNext(){if(!active)return;if(qi<qs.length){var ti=Math.min(Math.floor(qi/3),4);for(var i=0;i<5;i++){var el=document.getElementById("topic-"+i);if(el)el.className=i<ti?"topic done":i===ti?"topic active":"topic"}addMsg("AI",qs[qi]);qi++;setTimeout(askNext,15000)}else{active=false;addMsg("AI","That concludes our interview. Thank you for your thoughtful responses! You will receive results via email within 24 hours.");document.getElementById("endBtn").disabled=true;clearInterval(ti)}}
document.getElementById("startBtn").addEventListener("click",function(){this.disabled=true;document.getElementById("endBtn").disabled=false;active=true;startTimer();addMsg("AI","Welcome! I am Zara, your AI interviewer for the Full Stack Developer role at Ruh AI. I will ask you technical and behavioral questions. Speak clearly and take your time. Let us begin!");setTimeout(askNext,6000)});
document.getElementById("endBtn").addEventListener("click",function(){active=false;this.disabled=true;clearInterval(ti);addMsg("AI","Interview ended. Your responses have been saved. Thank you!");document.getElementById("avatarCircle").classList.remove("speaking")});
setupMedia()})();
</script>
</body>
</html>
