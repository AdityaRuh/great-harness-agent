<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview — Great Harness</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafaf9;--bg2:#fff;--bg3:#f5f5f4;--border:#e7e5e4;--t1:#1c1917;--t2:#57534e;--t3:#a8a29e;--font:'Outfit',sans-serif;--accent:#7C6EF0;--ok:#16a34a;--err:#dc2626;--r:12px}
body{font-family:var(--font);background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* Top bar */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:0 24px;height:56px;background:var(--bg2);border-bottom:1px solid var(--border)}
.topbar .logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;color:var(--t1)}
.topbar .logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7C6EF0,#D4537E);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.topbar .right-group{display:flex;align-items:center;gap:16px}
.topbar .timer{background:linear-gradient(135deg,#EEEDFE,#F5E6FB);border:1px solid rgba(124,110,240,.2);border-radius:20px;padding:6px 18px;font-size:13px;font-weight:500;color:#3C3489;display:flex;align-items:center;gap:8px}
.topbar .timer .rec-dot{width:8px;height:8px;border-radius:50%;background:var(--err);animation:blink 1s infinite}
.topbar .powered{font-size:11px;color:var(--t3);font-weight:500}

/* Topic pills */
.topics{display:flex;gap:8px;padding:10px 24px;background:var(--bg2);border-bottom:1px solid var(--border)}
.topic{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg3);color:var(--t3);border:1px solid transparent;transition:all .2s}
.topic.active{background:#EEEDFE;color:#3C3489;border-color:rgba(124,110,240,.2)}
.topic.done{background:#E1F5EE;color:#085041;border-color:rgba(29,158,117,.2)}

/* Main layout */
.main{display:flex;height:calc(100vh - 100px)}

/* Left: Avatar */
.avatar-side{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;background:linear-gradient(135deg,#EEEDFE 0%,#F5F5F4 50%,#E6F1FB 100%);overflow:hidden}
.avatar-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(124,110,240,0.1),transparent 70%);pointer-events:none;animation:glow 4s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.08)}}

.avatar-circle{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,#7C6EF0,#9B8FF7);display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:700;color:#fff;box-shadow:0 8px 40px rgba(124,110,240,.2);position:relative;z-index:1;transition:all .3s}
.avatar-circle.speaking{animation:speak .4s ease-in-out infinite alternate}
@keyframes speak{0%{transform:scale(1);box-shadow:0 8px 40px rgba(124,110,240,.2)}100%{transform:scale(1.06);box-shadow:0 12px 60px rgba(124,110,240,.4)}}
.avatar-circle.listening{box-shadow:0 8px 40px rgba(22,163,74,.25);background:linear-gradient(135deg,#1D9E75,#3CC49A)}

.avatar-name{margin-top:16px;font-size:13px;color:var(--t2);z-index:1;display:flex;align-items:center;gap:8px;font-weight:500}
.avatar-name .status-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px rgba(22,163,74,.4)}

.speech-bubble{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);max-width:480px;width:90%;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px 22px;font-size:14px;line-height:1.7;color:var(--t2);text-align:center;display:none;z-index:2;box-shadow:0 8px 32px rgba(0,0,0,.06)}

.status-bar{position:absolute;top:20px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:20px;font-size:12px;font-weight:500;z-index:3;display:none;backdrop-filter:blur(8px)}
.status-bar.ai-speaking{display:flex;align-items:center;gap:6px;background:rgba(124,110,240,.1);border:1px solid rgba(124,110,240,.2);color:#3C3489}
.status-bar.ai-speaking::before{content:'';width:8px;height:8px;border-radius:50%;background:#7C6EF0;animation:blink 1s infinite}
.status-bar.listening{display:flex;align-items:center;gap:6px;background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);color:#085041}
.status-bar.listening::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--ok);animation:blink 1s infinite}

/* Right: Candidate */
.candidate-side{width:380px;display:flex;flex-direction:column;background:var(--bg2);border-left:1px solid var(--border)}

.webcam-wrapper{position:relative;width:100%;aspect-ratio:4/3;background:var(--bg3);overflow:hidden}
.webcam-wrapper video{width:100%;height:100%;object-fit:cover;display:none;border-radius:0}
.webcam-off{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:13px;text-align:center;padding:20px}
.webcam-label{position:absolute;bottom:8px;left:8px;font-size:11px;color:#fff;background:rgba(0,0,0,.5);padding:3px 10px;border-radius:6px;font-weight:500;backdrop-filter:blur(4px)}

.mic-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
.mic-icon{width:28px;height:28px;border-radius:8px;background:#E1F5EE;color:#1D9E75;display:flex;align-items:center;justify-content:center}
.mic-name{font-size:12px;color:var(--t2);flex:1;font-weight:500}
.levels{display:flex;gap:2px;align-items:center;height:18px}
.levels .bar{width:3px;background:var(--ok);border-radius:2px;min-height:3px;transition:height .1s}

.live-text{padding:10px 16px;min-height:40px;font-size:12px;color:var(--ok);background:rgba(22,163,74,.03);border-bottom:1px solid var(--border);font-style:italic;font-weight:500}

.q-counter{font-size:11px;color:var(--t3);text-align:center;padding:6px;font-weight:500}

.transcript{flex:1;overflow-y:auto;padding:16px}
.transcript h3{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;font-weight:600}
.msg{margin-bottom:10px;padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.6}
.msg.ai{background:#EEEDFE;border-left:3px solid var(--accent);color:#3C3489}
.msg.user{background:#E1F5EE;border-left:3px solid var(--ok);color:#085041}
.msg .speaker{font-size:10px;font-weight:600;text-transform:uppercase;margin-bottom:4px;letter-spacing:.3px;opacity:.6}

.controls{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.btn{flex:1;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font)}
.btn-start{background:linear-gradient(135deg,var(--accent),#9B8FF7);color:#fff;box-shadow:0 4px 12px rgba(124,110,240,.25)}
.btn-start:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,110,240,.35)}
.btn-end{background:var(--bg2);color:var(--err);border:1.5px solid rgba(220,38,38,.2)}
.btn-end:hover{background:rgba(220,38,38,.06)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg{animation:fadeIn .3s ease}

/* Scrollbar */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="logo-icon">G</div><span>Great Harness</span></div>
  <div class="right-group">
    <div class="powered">AI-Powered Interview</div>
    <div class="timer"><div class="rec-dot"></div><span id="timer">30:00</span></div>
  </div>
</div>
<div class="topics" id="topics"></div>
<div class="main">
<div class="avatar-side">
  <div class="avatar-glow"></div>
  <div class="status-bar" id="statusBar"></div>
  <div class="avatar-circle" id="avatarCircle">Z</div>
  <div class="avatar-name"><span class="status-dot"></span>Zara — AI Interviewer</div>
  <div class="speech-bubble" id="speechBubble"></div>
</div>
<div class="candidate-side">
  <div class="webcam-wrapper"><video id="webcam" autoplay muted playsinline></video><div class="webcam-off" id="webcamOff">Camera loading...</div><div class="webcam-label">You</div></div>
  <div class="mic-bar"><div class="mic-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></div><span class="mic-name" id="micName">Connecting...</span><div class="levels" id="levels"></div></div>
  <div class="live-text" id="liveText">Your answer will appear here as you speak...</div>
  <div class="q-counter" id="qCounter"></div>
  <div class="transcript" id="transcript"><h3>Conversation</h3></div>
  <div class="controls"><button class="btn btn-start" id="startBtn">Start Interview</button><button class="btn btn-end" id="endBtn" disabled>End Interview</button></div>
</div>
</div>
<script>
(function(){
  var synth = window.speechSynthesis;
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recognition = SpeechRecognition ? new SpeechRecognition() : null;
  if(recognition){recognition.continuous=true;recognition.interimResults=true;recognition.lang="en-US";}

  function setupMedia(){
    navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(function(s){
      var v=document.getElementById("webcam");v.srcObject=s;v.style.display="block";
      document.getElementById("webcamOff").style.display="none";
      document.getElementById("micName").textContent="Mic active";
      var ctx=new AudioContext(),src=ctx.createMediaStreamSource(s),a=ctx.createAnalyser();
      a.fftSize=64;src.connect(a);var fd=new Uint8Array(a.frequencyBinCount);
      var lv=document.getElementById("levels");
      for(var i=0;i<8;i++){var b=document.createElement("div");b.className="bar";b.style.height="3px";lv.appendChild(b)}
      var bars=lv.querySelectorAll(".bar");
      (function t(){a.getByteFrequencyData(fd);for(var i=0;i<bars.length;i++)bars[i].style.height=Math.max(3,fd[i*2]/8)+"px";requestAnimationFrame(t)})();
    }).catch(function(){
      document.getElementById("micName").textContent="Allow mic/camera";
      document.getElementById("webcamOff").textContent="Please allow camera and microphone access to continue";
    });
  }

  var timeLeft=1800,ti=null;
  function startTimer(){ti=setInterval(function(){timeLeft--;var m=Math.floor(timeLeft/60),s=timeLeft%60;document.getElementById("timer").textContent=m+":"+(s<10?"0":"")+s;if(timeLeft<=0)clearInterval(ti)},1000)}

  function addMsg(who,txt){
    var d=document.createElement("div");d.className="msg "+(who==="Zara"?"ai":"user");
    d.innerHTML='<div class="speaker">'+who+"</div>"+txt;
    document.getElementById("transcript").appendChild(d);
    d.scrollIntoView({behavior:"smooth"});
  }

  function avatarSpeak(text,cb){
    var bar=document.getElementById("statusBar");
    bar.className="status-bar ai-speaking";bar.textContent="Zara is speaking...";
    document.getElementById("avatarCircle").classList.add("speaking");
    var bubble=document.getElementById("speechBubble");
    bubble.textContent=text;bubble.style.display="block";
    addMsg("Zara",text);
    var utter=new SpeechSynthesisUtterance(text);
    utter.rate=0.95;utter.pitch=1.1;
    var voices=synth.getVoices();
    for(var i=0;i<voices.length;i++){
      if(voices[i].name.indexOf("Samantha")>=0||voices[i].name.indexOf("Karen")>=0||voices[i].name.indexOf("Female")>=0){
        utter.voice=voices[i];break;
      }
    }
    utter.onend=function(){
      document.getElementById("avatarCircle").classList.remove("speaking");
      bar.className="status-bar";bar.textContent="";
      bubble.style.display="none";
      if(cb)cb();
    };
    synth.speak(utter);
  }

  function listenToCandidate(cb){
    if(!recognition){addMsg("You","[Speech recognition not supported — use Chrome]");setTimeout(cb,3000);return}
    var bar=document.getElementById("statusBar");
    bar.className="status-bar listening";bar.textContent="Listening to your answer...";
    document.getElementById("avatarCircle").classList.add("listening");
    document.getElementById("liveText").textContent="Speak now...";
    var finalText="";var silenceTimer=null;
    recognition.onresult=function(e){
      var interim="",final="";
      for(var i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal){final+=e.results[i][0].transcript+" ";}
        else{interim+=e.results[i][0].transcript;}
      }
      if(final)finalText+=final;
      document.getElementById("liveText").textContent=finalText+interim||"Listening...";
      clearTimeout(silenceTimer);
      silenceTimer=setTimeout(function(){recognition.stop()},4000);
    };
    recognition.onend=function(){
      document.getElementById("avatarCircle").classList.remove("listening");
      bar.className="status-bar";bar.textContent="";
      var answer=finalText.trim();
      if(answer){
        addMsg("You",answer);
        document.getElementById("liveText").textContent="Processing your answer...";
      } else {
        document.getElementById("liveText").textContent="No answer detected — moving to next question";
      }
      setTimeout(cb,1500);
    };
    recognition.onerror=function(e){
      if(e.error!=="no-speech"&&e.error!=="aborted"){
        document.getElementById("liveText").textContent="Mic error: "+e.error;
      }
      setTimeout(function(){try{recognition.stop()}catch(x){}},2000);
    };
    try{recognition.start()}catch(e){}
    setTimeout(function(){try{recognition.stop()}catch(e){}},60000);
  }

  var topicNames=["Technical","Architecture","Problem Solving","Culture Fit","Q&A"];
  var te=document.getElementById("topics");
  topicNames.forEach(function(t,i){var d=document.createElement("div");d.className="topic"+(i===0?" active":"");d.textContent=t;d.id="topic-"+i;te.appendChild(d)});
  function updateTopics(qi){
    var ti=Math.min(Math.floor(qi/3),4);
    for(var i=0;i<5;i++){var el=document.getElementById("topic-"+i);if(el)el.className=i<ti?"topic done":i===ti?"topic active":"topic"}
  }

  var qi=0,active=false,questionsLoaded=false;
  var candidateName="Candidate",candidateEmail="",roleTitle="this position";
  fetch("/api/v1/interview/questions/__SESSION_ID__").then(function(r){return r.json()}).then(function(data){
    if(data.candidate_name)candidateName=data.candidate_name;
    if(data.candidate_email)candidateEmail=data.candidate_email;
    if(data.role_title)roleTitle=data.role_title;
    if(data.questions&&data.questions.length>0){
      qs=data.questions.map(function(q){return typeof q==="string"?q:(q.text||q.question||"")}).filter(function(q){return q.length>0});
      if(qs.length>0){questionsLoaded=true;console.log("Loaded "+qs.length+" tailored questions for "+candidateName)}
    }
  }).catch(function(e){console.log("Using default questions")});
  var qs=[
    "Can you walk me through your most recent project and your specific role in it?",
    "What technologies did you use and why did you choose them?",
    "Tell me about a technical challenge you faced and how you solved it.",
    "How do you approach debugging a production issue under time pressure?",
    "Describe your experience with React and Next.js in production.",
    "How do you manage state in large React applications?",
    "What is your backend experience with Python, FastAPI, and databases?",
    "How do you approach API design and documentation?",
    "Tell me about a system or feature you architected from scratch.",
    "How do you ensure code quality across your team?",
    "What is your testing approach — unit tests, integration, end-to-end?",
    "How do you prioritize when multiple things are urgent?",
    "What excites you about this role at Ruh AI?",
    "Do you have any questions for us about the role or team?"
  ];

  function runQuestion(){
    if(!active)return;
    if(qi>=qs.length){
      avatarSpeak("That concludes our interview. Thank you for your responses! Evaluating now...",function(){
        submitTranscript();
        active=false;document.getElementById("endBtn").disabled=true;clearInterval(ti);
        document.getElementById("liveText").textContent="Evaluating your answers...";
      });
      return;
    }
    updateTopics(qi);
    document.getElementById("qCounter").textContent="Question "+(qi+1)+" of "+qs.length;
    avatarSpeak(qs[qi],function(){
      qi++;
      listenToCandidate(function(){
        setTimeout(runQuestion,1500);
      });
    });
  }

  document.getElementById("startBtn").addEventListener("click",function(){
    this.disabled=true;document.getElementById("endBtn").disabled=false;
    active=true;startTimer();
    avatarSpeak("Welcome! I am Zara, your AI interviewer for the "+roleTitle+" role at Ruh AI. I will ask you a series of technical and behavioral questions. Please take your time and speak clearly into your microphone. Let us begin!",function(){
      setTimeout(runQuestion,1000);
    });
  });
  document.getElementById("endBtn").addEventListener("click",function(){
    active=false;this.disabled=true;clearInterval(ti);synth.cancel();
    if(recognition)try{recognition.stop()}catch(e){}
    addMsg("Zara","Interview ended. Evaluating your responses...");
    document.getElementById("avatarCircle").classList.remove("speaking");
    document.getElementById("avatarCircle").classList.remove("listening");
    document.getElementById("statusBar").className="status-bar ai-speaking";
    document.getElementById("statusBar").textContent="Evaluating with AI...";
    document.getElementById("liveText").textContent="Please wait — evaluating your answers...";
    submitTranscript();
  });

  synth.onvoiceschanged=function(){synth.getVoices()};

  function submitTranscript(){
    var msgs=document.querySelectorAll(".msg");
    var transcript=[];
    msgs.forEach(function(m){
      var sp=m.querySelector(".speaker");
      if(sp){
        var who=sp.textContent.trim();
        var text=m.textContent.replace(who,"").trim();
        if(text)transcript.push({speaker:who==="ZARA"?"AI":"You",text:text});
      }
    });
    if(transcript.length<1)return;
    var bar=document.getElementById("statusBar");
    bar.className="status-bar ai-speaking";bar.textContent="Evaluating your interview...";
    document.getElementById("liveText").textContent="Sending "+transcript.length+" responses for evaluation...";
    var body={session_id:"__SESSION_ID__",candidate_name:candidateName,candidate_email:candidateEmail,role_title:roleTitle,transcript:transcript};
    fetch("/api/v1/interview/evaluate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(data){
      bar.className="status-bar";bar.textContent="";
      if(data.interview_score!==undefined){
        var col=data.interview_score>=70?"var(--ok)":data.interview_score>=55?"#ca8a04":"var(--err)";
        addMsg("Zara","Your interview has been evaluated. Score: "+data.interview_score+"/100. Verdict: "+data.verdict);
        document.getElementById("liveText").innerHTML="<strong style=\"color:"+col+"\">Score: "+data.interview_score+"/100 — "+data.verdict+"</strong>";
      }else{
        document.getElementById("liveText").textContent="Evaluation submitted.";
      }
    }).catch(function(e){document.getElementById("liveText").textContent="Evaluation submitted.";});
  }

  setupMedia();
})();
</script>
</body>
</html>
