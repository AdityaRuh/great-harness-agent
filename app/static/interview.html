<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview — Ruh AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#0a0a1a;color:#e0e0e0;height:100vh;overflow:hidden}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(10,10,26,0.95);border-bottom:1px solid rgba(124,110,240,0.15)}
.topbar .logo{font-weight:700;font-size:18px;color:#7c6ef0}
.topbar .logo span{color:#4ade80}
.topbar .timer{background:rgba(124,110,240,0.1);border:1px solid rgba(124,110,240,0.3);border-radius:20px;padding:6px 16px;font-size:14px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:6px}
.topbar .timer svg{width:16px;height:16px;fill:#7c6ef0}

.topics{display:flex;gap:8px;padding:8px 24px;background:rgba(10,10,26,0.9);border-bottom:1px solid rgba(255,255,255,0.05)}
.topic{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;background:rgba(255,255,255,0.05);color:#888;position:relative}
.topic.active{background:rgba(124,110,240,0.15);color:#7c6ef0}
.topic.done{background:rgba(74,222,128,0.1);color:#4ade80}
.topic .bar{position:absolute;bottom:0;left:0;height:2px;background:#7c6ef0;border-radius:2px;transition:width 0.3s}

.main{display:flex;height:calc(100vh - 90px)}

.avatar-side{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;background:linear-gradient(135deg,#0d0d24 0%,#1a1a3e 100%)}
.avatar-container{width:400px;height:400px;border-radius:50%;overflow:hidden;position:relative;box-shadow:0 0 80px rgba(124,110,240,0.15)}
.avatar-container canvas{width:100%!important;height:100%!important}
.avatar-glow{position:absolute;width:440px;height:440px;border-radius:50%;background:radial-gradient(circle,rgba(124,110,240,0.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}}
.avatar-name{margin-top:16px;font-size:14px;color:#888}
.avatar-speaking{position:absolute;bottom:60px;right:40px;max-width:320px;background:rgba(20,20,50,0.9);backdrop-filter:blur(12px);border:1px solid rgba(124,110,240,0.2);border-radius:16px;padding:14px 18px;font-size:14px;line-height:1.6;color:#ccc}

.candidate-side{width:340px;display:flex;flex-direction:column;background:#0d0d1e;border-left:1px solid rgba(255,255,255,0.05)}
.webcam-wrapper{position:relative;width:100%;aspect-ratio:4/3;background:#111}
.webcam-wrapper video{width:100%;height:100%;object-fit:cover}
.webcam-label{position:absolute;bottom:8px;left:8px;font-size:11px;color:#888;background:rgba(0,0,0,0.6);padding:2px 8px;border-radius:4px}
.mic-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(124,110,240,0.05);border-bottom:1px solid rgba(255,255,255,0.05)}
.mic-bar .mic-icon{width:18px;height:18px;fill:#4ade80}
.mic-bar .mic-name{font-size:12px;color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mic-bar .levels{display:flex;gap:2px;align-items:center}
.mic-bar .levels .bar{width:3px;height:12px;background:#4ade80;border-radius:2px;transition:height 0.1s}

.transcript{flex:1;overflow-y:auto;padding:16px}
.transcript h3{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.msg{margin-bottom:12px;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.msg.ai{background:rgba(124,110,240,0.08);border-left:3px solid #7c6ef0}
.msg.user{background:rgba(74,222,128,0.05);border-left:3px solid #4ade80}
.msg .speaker{font-size:10px;font-weight:600;text-transform:uppercase;margin-bottom:4px;color:#666}

.controls{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.05);display:flex;gap:8px}
.btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-start{background:#7c6ef0;color:white}
.btn-start:hover{background:#6b5ce0}
.btn-end{background:#dc2626;color:white}
.btn-end:hover{background:#b91c1c}
.btn:disabled{opacity:0.4;cursor:not-allowed}

.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.green{background:#4ade80}
.status-dot.yellow{background:#fbbf24;animation:blink 1s infinite}
.status-dot.red{background:#f87171}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Ruh<span>AI</span> Interview</div>
  <div class="timer">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 10V7h-2v7h5v-2h-3z"/></svg>
    <span id="timer">30:00</span>
  </div>
</div>

<div class="topics" id="topics"></div>

<div class="main">
  <div class="avatar-side">
    <div class="avatar-glow"></div>
    <div class="avatar-container" id="avatarContainer">
      <canvas id="avatarCanvas"></canvas>
    </div>
    <div class="avatar-name"><span class="status-dot green" id="statusDot"></span>Zara — AI Interviewer</div>
    <div class="avatar-speaking" id="avatarSpeech" style="display:none"></div>
  </div>

  <div class="candidate-side">
    <div class="webcam-wrapper">
      <video id="webcam" autoplay muted playsinline></video>
      <div class="webcam-label">You</div>
    </div>
    <div class="mic-bar">
      <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm-1-9a1 1 0 012 0v6a1 1 0 01-2 0V5zm6 6a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-5 9v3h-2v-3h2z"/></svg>
      <span class="mic-name" id="micName">Connecting mic...</span>
      <div class="levels" id="levels"></div>
    </div>

    <div class="transcript" id="transcript">
      <h3>Conversation</h3>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="startBtn" onclick="startInterview()">Start Interview</button>
      <button class="btn btn-end" id="endBtn" onclick="endInterview()" disabled>End Interview</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const CLAWVATAR_WS = '__CLAWVATAR_WS__';
const CLAWVATAR_HTTP = '__CLAWVATAR_HTTP__';
const AVATAR_URL = '__AVATAR_URL__';
const SESSION_ID = '__SESSION_ID__';

// Three.js setup
const canvas = document.getElementById('avatarCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(400, 400);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(25, 1, 0.1, 100);
camera.position.set(0, 1.4, 1.8);
camera.lookAt(0, 1.2, 0);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const key = new THREE.DirectionalLight(0xdaccff, 1.2);
key.position.set(2, 3, 2);
scene.add(key);
const fill = new THREE.DirectionalLight(0x88aaff, 0.4);
fill.position.set(-2, 1, 1);
scene.add(fill);

let vrm = null;
let clock = new THREE.Clock();
let ws = null;

// Load VRM via three-vrm
async function loadAvatar() {
  try {
    const { VRMLoaderPlugin } = await import('https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.1.1/lib/three-vrm.module.min.js');
    const loader = new GLTFLoader();
    loader.register(p => new VRMLoaderPlugin(p));
    
    loader.load(AVATAR_URL, (gltf) => {
      vrm = gltf.userData.vrm;
      scene.add(vrm.scene);
      console.log('Avatar loaded:', vrm);
    }, undefined, (err) => {
      console.error('Avatar load error:', err);
    });
  } catch(e) {
    console.error('VRM import error:', e);
  }
}

// Connect to Clawvatar WebSocket
function connectWS() {
  ws = new WebSocket(CLAWVATAR_WS + '/ws');
  ws.onopen = () => {
    document.getElementById('statusDot').className = 'status-dot green';
    // Tell server to load avatar
    ws.send(JSON.stringify({type: 'avatar.load', model_path: '/Users/rapidinnovation/clawvatar-engine/avatars/interviewer.vrm'}));
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'weights' && vrm) {
      applyWeights(data);
    }
  };
  ws.onclose = () => {
    document.getElementById('statusDot').className = 'status-dot red';
    setTimeout(connectWS, 3000);
  };
}

function applyWeights(data) {
  if (!vrm || !vrm.expressionManager) return;
  const w = data.weights || {};
  for (const [name, val] of Object.entries(w)) {
    try { vrm.expressionManager.setValue(name, val); } catch(e) {}
  }
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  if (vrm) vrm.update(clock.getDelta());
  renderer.render(scene, camera);
}
animate();

// Webcam
async function setupWebcam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('webcam').srcObject = stream;
    document.getElementById('micName').textContent = 'Mic active';
    window._audioStream = stream;
    
    // Audio levels
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);
    const analyzer = ctx.createAnalyser();
    analyzer.fftSize = 64;
    src.connect(analyzer);
    const data = new Uint8Array(analyzer.frequencyBinCount);
    
    const levels = document.getElementById('levels');
    for(let i=0;i<8;i++){const b=document.createElement('div');b.className='bar';levels.appendChild(b)}
    const bars = levels.querySelectorAll('.bar');
    
    function updateLevels() {
      analyzer.getByteFrequencyData(data);
      bars.forEach((b,i) => { b.style.height = Math.max(3, data[i*2]/8) + 'px'; });
      requestAnimationFrame(updateLevels);
    }
    updateLevels();
  } catch(e) {
    document.getElementById('micName').textContent = 'Mic unavailable';
  }
}

// Timer
let timeLeft = 30*60;
function updateTimer() {
  const m = Math.floor(timeLeft/60);
  const s = timeLeft%60;
  document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  if(timeLeft>0) { timeLeft--; setTimeout(updateTimer, 1000); }
}

// Transcript
window.addMsg = function(speaker, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (speaker === 'AI' ? 'ai' : 'user');
  div.innerHTML = `<div class="speaker">${speaker}</div>${text}`;
  document.getElementById('transcript').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
  
  if (speaker === 'AI') {
    const el = document.getElementById('avatarSpeech');
    el.textContent = text;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 8000);
  }
};

// Interview flow
window.startInterview = function() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('endBtn').disabled = false;
  updateTimer();
  window.addMsg('AI', 'Hi! Thank you for joining this technical interview for the Full Stack Developer role at Ruh AI. Let me start — can you tell me about your most recent project and your role in it?');
};

window.endInterview = function() {
  document.getElementById('endBtn').disabled = true;
  window.addMsg('AI', 'Thank you for your time! Your responses are being evaluated. You will receive results via email within 24 hours.');
};

// Topics
const topicNames = ['Technical', 'Architecture', 'Problem Solving', 'Culture Fit', 'Q&A'];
const topicsEl = document.getElementById('topics');
topicNames.forEach((t,i) => {
  const d = document.createElement('div');
  d.className = 'topic' + (i===0?' active':'');
  d.textContent = t;
  topicsEl.appendChild(d);
});

// Init
loadAvatar();
connectWS();
setupWebcam();
</script>
</body>
</html>
